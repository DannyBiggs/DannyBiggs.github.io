<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coin Forge Overlay</title>

  <script src="https://cdn.jsdelivr.net/npm/@streamerbot/client/dist/streamerbot-client.js"></script>
 
  <style>
  @font-face {
    font-family: "ComboFont";
    src: url("fonts/PressStart2P-Regular.ttf") format("truetype");
    font-display: swap;
  }
  @font-face {
    font-family: "CoinForgeName";
    src: url("fonts/DungeonDepths-owJWV.ttf") format("truetype");
    font-display: swap;
  }
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    body {
      color: #e8d7a2;
      position: relative;
    }

    .overlay-root {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .screen-border-fx {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 40;
      opacity: 0;
      box-shadow: inset 0 0 90px rgba(255, 180, 40, 0);
    }
    
    .screen-border-fx.mythic {
      animation: screenMythicBorder 1.1s ease-out;
    }
    
    .screen-border-fx.cursed {
      animation: screenCursedBorder 0.9s ease-out;
    }
    
    .screen-border-fx.jackpot {
      animation: screenJackpotBorder 0.9s ease-out;
    }

    .screen-border-fx.legendary {
      animation: screenLegendaryBorder 0.9s ease-out;
    }

    .screen-border-fx.greed {
      animation: screenGreedBorder 0.95s ease-out;
    }
    
    @keyframes screenMythicBorder {
      0% { opacity: 0; box-shadow: inset 0 0 0 rgba(255, 180, 40, 0); }
      30% { opacity: 1; box-shadow: inset 0 0 120px rgba(255, 190, 70, 0.75), inset 0 0 220px rgba(255, 90, 20, 0.28); }
      100% { opacity: 0; box-shadow: inset 0 0 40px rgba(255, 140, 30, 0); }
    }
    
    @keyframes screenCursedBorder {
      0% { opacity: 0; box-shadow: inset 0 0 0 rgba(80, 170, 255, 0); }
      30% { opacity: 1; box-shadow: inset 0 0 120px rgba(80, 170, 255, 0.65), inset 0 0 220px rgba(20, 60, 255, 0.28); }
      100% { opacity: 0; box-shadow: inset 0 0 40px rgba(80, 170, 255, 0); }
    }
    
    @keyframes screenJackpotBorder {
      0% { opacity: 0; box-shadow: inset 0 0 0 rgba(255, 40, 40, 0); }
      30% { opacity: 1; box-shadow: inset 0 0 120px rgba(255, 55, 55, 0.75), inset 0 0 220px rgba(120, 0, 0, 0.35); }
      100% { opacity: 0; box-shadow: inset 0 0 40px rgba(255, 40, 40, 0); }
    }

    @keyframes screenLegendaryBorder {
      0% { opacity: 0; box-shadow: inset 0 0 0 rgba(255, 150, 35, 0); }
      30% { opacity: 1; box-shadow: inset 0 0 120px rgba(255, 165, 55, 0.72), inset 0 0 220px rgba(255, 95, 20, 0.28); }
      100% { opacity: 0; box-shadow: inset 0 0 40px rgba(255, 120, 25, 0); }
    }

    @keyframes screenGreedBorder {
      0% { opacity: 0; box-shadow: inset 0 0 0 rgba(255, 190, 60, 0); }
      30% { opacity: 1; box-shadow: inset 0 0 130px rgba(255, 190, 60, 0.78), inset 0 0 230px rgba(115, 52, 8, 0.42); }
      100% { opacity: 0; box-shadow: inset 0 0 40px rgba(255, 150, 35, 0); }
    }
    
    .embers {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    body.forge-active .embers {
      opacity: 1;
    }

    .ember {
      position: absolute;
      bottom: -20px;
      width: 4px;
      height: 4px;
      background: #ffb347;
      border-radius: 50%;
      opacity: 0.45;
      box-shadow: 0 0 10px rgba(255,179,71,0.8);
      animation: riseEmber linear infinite;
    }

    .ember:nth-child(1) { left: 8%; animation-duration: 9s; animation-delay: 0s; }
    .ember:nth-child(2) { left: 20%; animation-duration: 13s; animation-delay: 2s; }
    .ember:nth-child(3) { left: 36%; animation-duration: 11s; animation-delay: 5s; }
    .ember:nth-child(4) { left: 52%; animation-duration: 15s; animation-delay: 1s; }
    .ember:nth-child(5) { left: 68%; animation-duration: 10s; animation-delay: 4s; }
    .ember:nth-child(6) { left: 86%; animation-duration: 14s; animation-delay: 3s; }

    body.forge-active .ember {
      background: #ffe08a;
      opacity: 0.88;
      box-shadow:
        0 0 14px rgba(255, 240, 170, 1),
        0 0 30px rgba(255, 190, 70, 0.72),
        0 0 48px rgba(255, 140, 35, 0.35);
    }
    
    body.forge-active .ember:nth-child(odd) {
      width: 6px;
      height: 6px;
    }
    
    body.forge-active .ember:nth-child(even) {
      width: 5px;
      height: 5px;
    }
    
    body.forge-active .ember:nth-child(1) { animation-duration: 7s; }
    body.forge-active .ember:nth-child(2) { animation-duration: 9s; }
    body.forge-active .ember:nth-child(3) { animation-duration: 8s; }
    body.forge-active .ember:nth-child(4) { animation-duration: 10s; }
    body.forge-active .ember:nth-child(5) { animation-duration: 7.5s; }
    body.forge-active .ember:nth-child(6) { animation-duration: 9.5s; }

    @keyframes riseEmber {
      0% { transform: translateY(0) scale(0.7); opacity: 0; }
      15% { opacity: 0.6; }
      100% { transform: translateY(-110vh) scale(1.4); opacity: 0; }
    }

    .forge-simulator {
      width: min(96vw, 1280px);
      text-align: center;
      pointer-events: none;
    }

    .forge-stage {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      margin: 0 auto;
      overflow: visible;
      border-radius: 0;
      border: none;
      background: transparent;
      box-shadow: none;
      /*
      border-radius: 16px;
      border: 2px solid rgba(58, 42, 24, 0.85);
      background: transparent;
      box-shadow:
        0 0 28px rgba(255,179,71,0.16),
        inset 0 0 60px rgba(255,120,32,0.08);
      */
      opacity: 0;
      transform: scale(0.985);
      transition: opacity 1.15s ease, transform 1.15s ease;
    }

    .forge-stage.visible {
      opacity: 1;
      transform: scale(1);
    }

    .forge-background {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
      pointer-events: none;
      z-index: 1;
      
      transform: translateY(36px);
    }

    .forge-background-glow {
      position: absolute;
      inset: 0;
    
      width: 100%;
      height: 100%;
    
      object-fit: contain;
      image-rendering: pixelated;
    
      pointer-events: none;
    
      opacity: 0;
    
      z-index: 2;
    
      mix-blend-mode: screen;
      transform: translateY(36px);
    }

    /* ===== FORGE PRESSURE GAUGE TEST START ===== */
    .forge-pressure-fill {
      position: absolute;
    
      left: 50%;
      top: 34.5%;
    
      width: 430px;
      height: 430px;
    
      transform: translate(-50%, -50%) translateY(62px);
    
      border-radius: 50%;
    
      pointer-events: none;
    
      z-index: 0;
    
      opacity: 0.95;
    
      background: conic-gradient(
        from -90deg,
        rgba(255, 85, 18, 0.95) 0deg,
        rgba(255, 190, 55, 0.95) var(--pressure-deg, 180deg),
        transparent var(--pressure-deg, 180deg),
        transparent 360deg
      );
    
      mask: radial-gradient(
        circle,
        transparent 0 43%,
        black 44% 51%,
        transparent 52% 100%
      );
    
      -webkit-mask: radial-gradient(
        circle,
        transparent 0 43%,
        black 44% 51%,
        transparent 52% 100%
      );

      transition:
        opacity 260ms ease,
        filter 260ms ease;
      
      filter:
        brightness(1.05)
        drop-shadow(0 0 6px rgba(255, 135, 35, 0.45));
    }
    /* ===== FORGE PRESSURE GAUGE TEST END ===== */

    /* ===== FORGE ERUPTION FX START ===== */
    .forge-eruption-flash {
      display: none;
    }
    
    .forge-eruption-vent {
      position: absolute;
      top: 54%;
      width: 110px;
      height: 210px;
      pointer-events: none;
      z-index: 4;
      opacity: 0;
      mix-blend-mode: screen;
      background:
        linear-gradient(
          to top,
          rgba(255, 235, 170, 0.7),
          rgba(255, 145, 40, 0.28) 42%,
          rgba(120, 55, 20, 0) 100%
        );
      filter: blur(8px);
    }
    
    .forge-eruption-vent.vent-left {
      left: 31%;
      transform: rotate(-18deg);
    }
    
    .forge-eruption-vent.vent-right {
      right: 31%;
      transform: rotate(18deg);
    }
    
    .forge-stage.forge-erupting {
      animation: forgeEruptionRecoil 520ms steps(5, end);
    }
    
    .forge-stage.forge-erupting .forge-background-glow {
      opacity: 1;
      animation: forgeEruptionGlow 1450ms steps(7, end);
    }
    
    .forge-stage.forge-erupting .forge-pressure-fill {
      filter:
        brightness(1.85)
        drop-shadow(0 0 14px rgba(255, 210, 95, 0.85))
        drop-shadow(0 0 26px rgba(255, 90, 20, 0.45));
    }

    .forge-stage.eruption-cinematic {
      animation:
        forgeEruptionStageTakeoverZoomShake 6200ms ease-in-out,
        forgeEruptionRapidVibration 70ms linear infinite;
      transform-origin: center 45%;
    }

    .forge-stage.eruption-cinematic .slot-row {
      animation: forgeEruptionSlotsVanish 850ms ease-in forwards;
    }
    
    .forge-stage.eruption-cinematic .player-identity-layer {
      animation: forgeEruptionIdentityVanish 650ms ease-in forwards;
    }

    .forge-stage.eruption-cinematic .forge-background,
    .forge-stage.eruption-cinematic .forge-background-glow {
      animation: forgeEruptionBackgroundTakeoverZoom 3400ms ease-in forwards;
      transform-origin: center 42%;
    }
    
    .forge-stage.eruption-cinematic .forge-pressure-fill {
      opacity: 0 !important;
      visibility: hidden !important;
    }

    .forge-stage.eruption-cinematic .forge-eruption-vent {
      animation: forgeEruptionVent 2800ms steps(12, end);
    }

    @keyframes forgeEruptionStageTakeoverZoomShake {
      0% {
        transform: scale(1);
        filter: brightness(1) saturate(1);
      }
    
      30% {
        transform: scale(1.035);
        filter: brightness(1.1) saturate(1.05);
      }
    
      58% {
        transform: scale(1.08);
        filter: brightness(1.28) saturate(1.12);
      }
    
      76% {
        transform: scale(1.15);
        filter: brightness(1.55) saturate(1.2);
      }
    
      100% {
        transform: scale(1);
        filter: brightness(1) saturate(1);
      }
    }

    @keyframes forgeEruptionRapidVibration {
      0% { translate: 0px 0px; }
      10% { translate: -1px 1px; }
      20% { translate: 1px -1px; }
      30% { translate: -2px 0px; }
      40% { translate: 2px 1px; }
      50% { translate: -2px -1px; }
      60% { translate: 2px 0px; }
      70% { translate: -1px 2px; }
      80% { translate: 1px -2px; }
      90% { translate: -1px 1px; }
      100% { translate: 0px 0px; }
    }
    
    @keyframes forgeEruptionBackgroundTakeoverZoom {
      0% {
        opacity: 1;
        transform: translateY(36px) scale(1);
        filter: brightness(1) saturate(1) contrast(1);
      }
    
      25% {
        opacity: 1;
        transform: translateY(36px) scale(1);
        filter: brightness(1.65) saturate(1.25) contrast(1.08);
      }
    
      50% {
        opacity: 1;
        transform: translateY(36px) scale(1);
        filter: brightness(2.8) saturate(1.45) contrast(1.18);
      }
    
      78% {
        opacity: 1;
        transform: translateY(36px) scale(1);
        filter: brightness(3.85) saturate(0.8) contrast(1.28);
      }
    
      100% {
        opacity: 1;
        transform: translateY(36px) scale(1);
        filter: brightness(5.6) saturate(0.28) contrast(1.42);
      }
    }

    @keyframes forgeEruptionSlotsVanish {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
        filter: brightness(1);
      }

      38% {
        opacity: 1;
        transform: translate(-50%, -54%) scale(1.05);
        filter: brightness(1.8);
      }

      100% {
        opacity: 0;
        transform: translate(-50%, -64%) scale(0.58);
        filter: brightness(3.2) blur(5px);
      }
    }

    @keyframes forgeEruptionIdentityVanish {
      0% {
        opacity: 1;
        transform: translateX(-50%) scale(1);
      }

      100% {
        opacity: 0;
        transform: translateX(-50%) translateY(24px) scale(0.88);
      }
    }

    .forge-stage.eruption-forge-returning {
      animation: forgeStageReturnSettle 2100ms cubic-bezier(.16,.92,.2,1) forwards;
      transform-origin: center 45%;
    }

    .forge-stage.eruption-forge-returning .forge-background,
    .forge-stage.eruption-forge-returning .forge-background-glow {
      animation: forgeReturnSlamBack 1250ms cubic-bezier(.18,.92,.22,1) forwards;
      transform-origin: center 42%;
    }

    @keyframes forgeStageReturnSettle {
      0% {
        transform: scale(1.26);
        filter: brightness(2.15) saturate(1.36);
      }

      14% {
        transform: scale(1.18);
        filter: brightness(1.85) saturate(1.22);
      }

      34% {
        transform: scale(0.965);
        filter: brightness(1.35) saturate(1.05);
      }

      56% {
        transform: scale(1.035);
        filter: brightness(1.12) saturate(1.02);
      }

      76% {
        transform: scale(0.992);
        filter: brightness(1.04) saturate(1);
      }

      100% {
        transform: scale(1);
        filter: brightness(1) saturate(1);
      }
    }
    
    .forge-stage.eruption-forge-returning .player-identity-layer {
      animation: forgeReturnIdentityFade 920ms ease-out forwards;
    }
    
    @keyframes forgeReturnSlamBack {
      0% {
        opacity: 1;
        transform: translateY(36px) scale(1.24);
        filter: brightness(7.2) saturate(0.18) contrast(1.65);
      }

      16% {
        opacity: 1;
        transform: translateY(36px) scale(0.925);
        filter: brightness(2.6) saturate(0.62) contrast(1.22);
      }

      34% {
        opacity: 1;
        transform: translateY(36px) scale(1.06);
        filter: brightness(1.75) saturate(0.82) contrast(1.12);
      }

      58% {
        opacity: 1;
        transform: translateY(36px) scale(0.982);
        filter: brightness(1.22) saturate(0.96) contrast(1.04);
      }
    
      100% {
        opacity: 1;
        transform: translateY(36px) scale(1);
        filter: brightness(1) saturate(1) contrast(1);
      }
    }

    @keyframes forgeReturnIdentityFade {
      0% {
        opacity: 0;
        transform: translateX(-50%) translateY(18px) scale(0.94);
      }

      100% {
        opacity: 1;
        transform: translateX(-50%) translateY(0) scale(1);
      }
    }
    
    @keyframes forgeEruptionExplosionGifPop {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.82);
        filter:
          brightness(2)
          contrast(1.2)
          drop-shadow(0 0 36px rgba(255, 240, 180, 0.9))
          drop-shadow(0 0 130px rgba(255, 80, 20, 0.72));
      }
    
      8% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.02);
      }
    
      72% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.02);
      }
    
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1.04);
      }
    }
    
    .eruption-coin-rain-layer {
      position: fixed;
      left: 0;
      top: 0;
      width: 100vw;
      height: 100vh;
      overflow: visible;
      pointer-events: none;
      opacity: 0;
      visibility: hidden;
      z-index: 34;
      transform: none !important;
      transition: opacity 80ms ease;
    }
    
    .eruption-coin-rain-layer.active {
      opacity: 1;
      visibility: visible;
    }

    .forge-resonance-impact-flash {
      position: absolute;
      left: 50%;
      top: 43%;
      width: 720px;
      height: 720px;
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%) scale(0.08);
      background:
        radial-gradient(circle,
          rgba(255, 255, 245, 1) 0%,
          rgba(255, 240, 170, 0.95) 14%,
          rgba(255, 125, 30, 0.42) 34%,
          transparent 62%);
      mix-blend-mode: screen;
      filter: brightness(3.4) blur(2px);
      animation: forgeResonanceImpactFlash 420ms steps(5, end) forwards;
      z-index: 2;
    }

    @keyframes forgeResonanceImpactFlash {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.06); }
      18% { opacity: 1; transform: translate(-50%, -50%) scale(0.72); }
      42% { opacity: 0.95; transform: translate(-50%, -50%) scale(1.05); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.38); }
    }
    
    .forge-resonance-core {
      position: absolute;
      left: 50%;
      top: 43%;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0.25);
      background:
        radial-gradient(circle,
          rgba(255, 255, 245, 1) 0%,
          rgba(255, 236, 165, 0.95) 16%,
          rgba(255, 160, 45, 0.62) 40%,
          rgba(255, 80, 18, 0.28) 58%,
          transparent 76%);
      mix-blend-mode: screen;
      filter: blur(3px);
      animation: forgeResonanceCorePop 1550ms ease-out forwards;
    }

    .forge-resonance-shockwave {
      position: absolute;
      left: 50%;
      top: 43%;
      width: 450px;
      height: 450px;
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0.08);
      border: 14px solid rgba(255, 190, 70, 1);
      box-shadow:
        0 0 28px rgba(255, 255, 235, 1),
        0 0 90px rgba(255, 210, 95, 1),
        0 0 190px rgba(255, 120, 28, 0.9),
        0 0 330px rgba(255, 55, 12, 0.58),
        inset 0 0 100px rgba(255, 230, 120, 0.92);
      mix-blend-mode: screen;
      animation: forgeResonanceShockwave 1700ms cubic-bezier(.08,.82,.22,1) forwards;
      z-index: 18;
    }

    .forge-resonance-shockwave-behind-boss {
      position: fixed;
      z-index: 18;
    }
    
    .forge-resonance-shockwave.shockwave-2 {
      width: 490px;
      height: 490px;
      border-width: 5px;
      opacity: 0.86;
      animation-duration: 1820ms;
    }

    .forge-resonance-shockwave.shockwave-3 {
      width: 620px;
      height: 620px;
      border-width: 3px;
      opacity: 0.62;
      animation-duration: 1950ms;
    }

    .forge-resonance-spark {
      position: absolute;
      left: 50%;
      top: 43%;
      width: 10px;
      height: 10px;
      background: #fff0a8;
      image-rendering: pixelated;
      box-shadow:
        0 0 0 2px rgba(255, 170, 45, 0.9),
        0 0 18px rgba(255, 230, 135, 0.95);
      animation: forgeResonanceSparkBurst 900ms ease-out forwards;
    }

    @keyframes forgeResonanceCorePop {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.2); filter: brightness(3) blur(2px); }
      12% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); filter: brightness(3.2) blur(3px); }
      48% { opacity: 0.9; transform: translate(-50%, -50%) scale(1.28); filter: brightness(1.8) blur(7px); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.75); filter: brightness(1) blur(18px); }
    }

    @keyframes forgeResonanceShockwave {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.08);
        filter: brightness(5.2) saturate(1.25) blur(0px);
      }

      7% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(0.52);
        filter: brightness(5.6) saturate(1.35) blur(0px);
      }

      24% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.42);
        filter: brightness(4.1) saturate(1.25) blur(0px);
      }

      58% {
        opacity: 0.86;
        filter: brightness(2.35) saturate(1.15) blur(1px);
      }

      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(5.55);
        filter: brightness(1) saturate(1) blur(5px);
      }
    }

    @keyframes forgeResonanceSparkBurst {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) translate(0px, 0px) scale(1);
      }

      100% {
        opacity: 0;
        transform:
          translate(-50%, -50%)
          translate(
            calc(var(--spark-x) * 1px),
            calc(var(--spark-y) * 1px)
          )
          scale(0.35);
      }
    }
    
    /* ===== GLOBAL INSTABILITY REACTION FX START ===== */
    .forge-stage.instability-global-overcharged {
      animation: forgeInstabilityGlobalOvercharged 780ms steps(6, end);
    }

    .forge-stage.instability-global-scorched {
      animation: forgeInstabilityGlobalScorched 760ms steps(6, end);
    }

    .forge-stage.instability-global-burned-away {
      animation: forgeInstabilityGlobalBurnedAway 860ms steps(7, end);
    }

    .forge-stage.instability-pressure-burst .forge-pressure-fill {
      animation: forgeInstabilityPressureBurst 760ms steps(6, end);
    }

    .forge-stage.instability-pressure-sputter .forge-pressure-fill {
      animation: forgeInstabilityPressureSputter 820ms steps(7, end);
    }

    .forge-stage.instability-pressure-collapse .forge-pressure-fill {
      animation: forgeInstabilityPressureCollapse 920ms steps(7, end);
    }

    @keyframes forgeInstabilityGlobalOvercharged {
      0% { transform: scale(1); filter: brightness(1); }
      18% { transform: scale(1.01) translateY(-2px); filter: brightness(1.28) saturate(1.25); }
      42% { transform: scale(0.996) translateY(2px); filter: brightness(1.08) saturate(1.1); }
      68% { transform: scale(1.004) translateY(-1px); filter: brightness(1.18) saturate(1.18); }
      100% { transform: scale(1); filter: brightness(1); }
    }

    @keyframes forgeInstabilityGlobalScorched {
      0% { transform: scale(1); filter: brightness(1); }

    function setForgePressureGauge(percent) {
      if (!forgePressureFill) return;
    
      const safePercent = Math.max(0, Math.min(37, Number(percent) || 0));
      const degrees = safePercent * 3.6;
    
      forgePressureFill.style.setProperty("--pressure-deg", `${degrees}deg`);
      currentForgePressurePercent = safePercent;
    }
    
    function animateForgePressureGauge(targetPercent, duration = 900) {
      if (!forgePressureFill) return;
    
      const safeTarget = Math.max(0, Math.min(37, Number(targetPercent) || 0));
      const startPercent = currentForgePressurePercent;
      const change = safeTarget - startPercent;
      const startTime = performance.now();
    
      if (forgePressureAnimationFrame) {
        cancelAnimationFrame(forgePressureAnimationFrame);
      }
    
      function step(now) {
        const elapsed = now - startTime;
        const progress = Math.min(1, elapsed / duration);
    
        // Smooth ease-out
        const eased = 1 - Math.pow(1 - progress, 3);
    
        const nextPercent = startPercent + (change * eased);
        setForgePressureGauge(nextPercent);
    
        if (progress < 1) {
          forgePressureAnimationFrame = requestAnimationFrame(step);
        } else {
          forgePressureAnimationFrame = null;
        }
      }
    
      forgePressureAnimationFrame = requestAnimationFrame(step);
    }

    function normalizeCoinName(name) {
      if (!name) return "Bronze Coin";

      const clean = String(name).trim();

      if (clean.endsWith(" Coin") || clean === "Jackpot Booster") {
        return clean;
      }

      if (clean === "JackpotBooster") return "Jackpot Booster";

      return `${clean} Coin`;
    }

    function getCoinDefinition(rawCoin) {
      const normalizedName = normalizeCoinName(rawCoin && rawCoin.name ? rawCoin.name : rawCoin);
      const found = forgeCoins.find(coin =>
        coin.name.toLowerCase() === normalizedName.toLowerCase() ||
        coin.key.toLowerCase() === String(rawCoin && rawCoin.name ? rawCoin.name : rawCoin).toLowerCase()
      );

      if (found) {
        return { ...found, raw: rawCoin || {} };
      }

      return { ...forgeCoins.find(c => c.name === "Bronze Coin"), raw: rawCoin || {} };
    }

    function formatForgeCoinAmount(amount) {
      const safeAmount = Number(amount) || 0;
      const absolute = Math.abs(safeAmount).toLocaleString();

      return safeAmount < 0 ? `-${absolute}` : `+${absolute}`;
    }

    function getForgeResultCoinValue(rawCoin, coinDef) {
      const raw = rawCoin || {};

      const candidates = [
        raw.finalValue,
        raw.value,
        raw.coinValue,
        raw.payout,
        coinDef && coinDef.finalValue,
        coinDef && coinDef.value
      ];

      for (const candidate of candidates) {
        const numeric = Number(candidate);

        if (Number.isFinite(numeric)) {
          return numeric;
        }
      }

      const fallbackValues = {
        "Wood Coin": 1,
        "Bronze Coin": 25,
        "Silver Coin": 50,
        "Gold Coin": 100,
        "Diamond Coin": 500,
        "Anti Coin": -500,
        "Rainbow Coin": 2000
      };

      return fallbackValues[coinDef && coinDef.name] || 0;
    }

    function getForgeResonanceEarnedTotal(event, results) {
      const explicitTotal = Number(
        event.coinsEarned ??
        event.totalCoinsEarned ??
        event.pullTotal ??
        event.totalValue
      );

      if (Number.isFinite(explicitTotal)) {
        return explicitTotal;
      }

      const rawCoins = Array.isArray(event.coins) ? event.coins : [];

      const coinTotal = results.reduce((sum, coinDef, index) => {
        return sum + getForgeResultCoinValue(rawCoins[index], coinDef);
      }, 0);

      return coinTotal;
    }

    function startCoreBreachPendingSequence(pullId, options = {}) {
      if (!isActivePull(pullId)) return;

      stopCoreBreachPendingSequence();

      const pullCount = Math.max(1, Number(options.pullCount || 1));
      const triggerIndex = Math.max(0, Number(options.triggerIndex || 0));
      const remainingCoins = Math.max(0, pullCount - triggerIndex - 1);

      const pendingDuration = 900 + (remainingCoins * 760);
      const maxShake = 2 + (remainingCoins * 1.15);

      forgeStage.style.setProperty("--core-breach-pending-duration", `${pendingDuration}ms`);
      forgeStage.style.setProperty("--core-breach-shake-px", "1px");

      forgeStage.classList.add("core-breach-pending");

      const startedAt = Date.now();

      overlayState.coreBreachPendingTimer = setInterval(() => {
        if (!isActivePull(pullId)) {
          stopCoreBreachPendingSequence();
          return;
        }

        const progress = Math.min(1, (Date.now() - startedAt) / pendingDuration);
        const shake = 1 + ((maxShake - 1) * progress);

        forgeStage.style.setProperty("--core-breach-shake-px", `${shake.toFixed(2)}px`);
      }, 80);
    }

    let forgePressureLevel = 0;

    function setForgePressureForCoin(coinKey, progress = 0) {
      if (!forgeStage) return;

      overlayState.pressureGlowActive = true;
    
      let pressureGain = 0;
    
      switch (coinKey) {
        case "Gold":
          pressureGain = 0.018;
          break;
    
        case "Diamond":
        case "JackpotBooster":
          pressureGain = 0.032;
          break;
    
        case "Rainbow":
        case "Kingmaker":
          pressureGain = 0.045;
          break;
    
        case "Anti":
          pressureGain = 0.035;
          break;
    
        default:
          pressureGain = -0.012;
          break;
      }
    
      const latePressure =
        progress > 0.7
          ? ((progress - 0.7) / 0.3) * 0.012
          : 0;
    
      forgePressureLevel += pressureGain + latePressure;
    
      forgePressureLevel = Math.max(
        0,
        Math.min(forgePressureLevel, 0.14)
      );
    
      let opacity = 0.045 + forgePressureLevel;
      let brightness = 1 + (forgePressureLevel * 0.55);
      let saturation = 1 + (forgePressureLevel * 0.18);
      let hue = "0deg";
    
      if (coinKey === "Anti") {
        hue = "155deg";
        saturation = 0.9;
        brightness = 1.02 + (forgePressureLevel * 0.22);
      }
    
      setForgePressureCursedState(coinKey === "Anti");
    
      forgeStage.style.setProperty(
        "--forge-pressure-opacity",
        opacity.toFixed(2)
      );
    
      forgeStage.style.setProperty(
        "--forge-pressure-brightness",
        brightness.toFixed(2)
      );
    
      forgeStage.style.setProperty(
        "--forge-pressure-saturation",
        saturation.toFixed(2)
      );
    
      forgeStage.style.setProperty(
        "--forge-pressure-hue",
        hue
      );
    }

    async function handleForgePressurePayload(pullId, finalCoin, triggerIndex = 0, pullCount = 1) {
      if (!isActivePull(pullId)) return false;
      if (!finalCoin || !finalCoin.raw) return false;
    
      const pressureAfter =
        typeof finalCoin.raw.forgePressureAfter === "number"
          ? finalCoin.raw.forgePressureAfter
          : null;
    
      const eruptionTriggered =
        finalCoin.raw.jackpotHit === true;
    
      overlayState.lastPressurePayload = {
        pressureAfter,
        eruptionTriggered,
        source: eruptionTriggered ? "payload-jackpotHit" : "payload-pressure",
        coinName: finalCoin.name || finalCoin.raw.name || ""
      };
    
      if (pressureAfter === null) return false;
    
      if (eruptionTriggered) {
        overlayState.pendingEruption = {
          pullId,
          pressureAfter,
          source: "payload-jackpotHit",
          createdAt: Date.now(),
          triggerIndex,
          pullCount
        };

        updateForgePressureGauge(pressureAfter);

        startCoreBreachPendingSequence(
          pullId,
          {
            pressureAfter,
            triggerIndex,
            pullCount
          }
        );

        triggerScreenBorder("legendary", pullId);
        
        return true;
      }
    
      updateForgePressureGauge(pressureAfter);
      return false;
    }

    function snapshotForgeRevealState(pullId) {
      const slotWraps = Array.from(document.querySelectorAll(".slot-wrap"));
    
      return {
        pullId,
        createdAt: Date.now(),
        slotRowClassName: slotRow?.className || "",
        slotRowStyle: slotRow?.getAttribute("style") || "",

          return {
            index,
            wrapClassName: slotWrap.className,
            wrapStyle: slotWrap.getAttribute("style") || "",
            slotState: slotWrap.dataset.slotState || "",

            coinClassName: coin?.className || "",

          };
        })
      };
    }

    function startForgeRevealProgressionGate(pullId, options = {}) {
      if (!isActivePull(pullId)) return false;
    
      if (
        overlayState.forgeRevealSuspension &&
        overlayState.forgeRevealSuspension.ownerId === pullId
      ) {
        overlayState.forgeRevealSuspension.type = options.type || overlayState.forgeRevealSuspension.type;
        overlayState.forgeRevealSuspension.source = options.source || overlayState.forgeRevealSuspension.source;
        return true;
      }
    
      overlayState.forgeRevealSnapshot = snapshotForgeRevealState(pullId);
    
      overlayState.forgeRevealSuspension = {
        ownerId: pullId,
        type: options.type || "progressionGate",
        source: options.source || "unknown",
        startedAt: Date.now(),
        pauseAnimations: false
      };
    
      overlayState.pausedRevealAnimations = [];
    
      return true;
    }
    
    function pauseForgeRevealForCinematic(pullId, options = {}) {
      if (!isActivePull(pullId)) return false;
    
      if (
        overlayState.forgeRevealSuspension &&
        overlayState.forgeRevealSuspension.ownerId === pullId
      ) {
        return true;
      }
    
      const pausedAnimations = Array.from(
        document.querySelectorAll(
          ".slot-wrap.coin-cycling, .slot-coin.forming-from-forge, .slot-coin.materializing"
        )
      )
        .flatMap(element => element.getAnimations ? element.getAnimations() : [])
        .filter(animation => animation.playState === "running");
      
      if (options.pauseAnimations === true) {
        pausedAnimations.forEach(animation => animation.pause());
      }
    
      overlayState.pausedRevealAnimations = pausedAnimations;
      overlayState.forgeRevealSnapshot = snapshotForgeRevealState(pullId);
    
      overlayState.forgeRevealSuspension = {
        ownerId: pullId,
        type: options.type || "cinematic",
        source: options.source || "unknown",
        startedAt: Date.now(),
        pauseAnimations: options.pauseAnimations === true
      };
    
      return true;
    }
    
    function resumeForgeRevealAfterCinematic(pullId) {
      if (
        !overlayState.forgeRevealSuspension ||
        overlayState.forgeRevealSuspension.ownerId !== pullId
      ) {
        return false;
      }
    
      overlayState.pausedRevealAnimations.forEach(animation => {
        try {
          animation.play();
        } catch (err) {
          console.warn("Could not resume reveal animation:", err);
        }
      });
    
      overlayState.pausedRevealAnimations = [];
      overlayState.forgeRevealSuspension = null;
      overlayState.forgeRevealSnapshot = null;
    
      return true;
    }
    
    async function waitForForgeRevealResume(pullId) {
      while (
        isActivePull(pullId) &&

        overlayState.forgeRevealSuspension.ownerId === pullId
      ) {

    async function waitForForgeLandingGate(pullId, slot, finalCoin, index) {
      const slotWrap = slot?.closest(".slot-wrap");
      let enteredLandingGate = false;
    
      while (
        isActivePull(pullId) &&
        overlayState.forgeRevealSuspension &&
        overlayState.forgeRevealSuspension.ownerId === pullId
      ) {
        if (!enteredLandingGate) {
          enteredLandingGate = true;
    
          if (slotWrap) {
            slotWrap.style.transform = "";
            slotWrap.style.filter = "";
    
            setSlotState(slotWrap, "spinning", {
              pullId,
              coin: finalCoin.name
            });
    
            addSlotEffect(
              pullId,
              slotWrap,
              "coin-cycling",
              null,
              { restart: true }
            );
          }
    
          clearCoinEffects(slot);
          slot.classList.remove("landed");
          slot.src = coinFileForSlot(finalCoin, index);
    
          addCoinEffect(
            pullId,
            slot,
            "spinning",
            null,
            { restart: true }
          );
        }
    
        await wait(50);
      }
    
      if (enteredLandingGate) {
        slot.classList.remove("spinning");
    
        if (slotWrap) {
          slotWrap.classList.remove("coin-cycling");
        }
      }

    async function triggerForgeEruptionLifecycle(pullId, options = {}) {
      if (!isActivePull(pullId)) return false;
      if (!forgeStage) return false;
    
      const pressureAfter =
        typeof options.pressureAfter === "number"
          ? options.pressureAfter
          : overlayState.currentPressure;


      if (options.skipBuildup === true) {
        setForgeEruptionState(
          "erupting",
          {
            source: options.source || "payload"
          }
        );

        overlayState.forgeState = "erupting";
        overlayState.currentPressure = 100;
        setForgePressureStateFromValue(100);

        forgeStage.classList.add("core-breach-final-discharge");
        stopCoreBreachPendingSequence();

        addStageEffect(pullId, "forge-erupting", 2200, { restart: true });
        playForgeResonanceDischarge(pullId);
        applyPendingCoreBreachBossDamageTick({
          source: "boss-damage-after-core-breach-discharge"
        });
        
        await wait(2200);

        forgeStage.classList.remove("forge-erupting");
        forgeStage.classList.remove("core-breach-final-discharge");

        if (isActivePull(pullId)) {
          setForgeEruptionState("idle");
          overlayState.forgeState = "active";
        }

        return true;
      }
      
      setForgeEruptionState(
        "erupting",
        {
          source: options.source || "payload"
        }
      );
    
      overlayState.forgeState = "erupting";
      overlayState.currentPressure = 100;
      setForgePressureStateFromValue(100);
    
      addStageEffect(pullId, "forge-erupting", 6200, { restart: true });
      addStageEffect(pullId, "eruption-cinematic", 6200, { restart: true });
      
      startForgeEruptionAudioPlaceholder(pullId, "pressure-build");
    
      animateForgePressureGauge(37, 520);
    
      registerOwnedCleanupTimer(
        pullId,
        () => {
          if (!isActivePull(pullId)) return;
          updateForgePressureGauge(pressureAfter);
        },
        5200
      );

      await wait(3400);

      if (isActivePull(pullId)) {
        forgeStage.classList.add("eruption-forge-returning");
        playForgeResonanceDischarge(pullId);
        applyPendingCoreBreachBossDamageTick({
          source: "boss-damage-after-core-breach-discharge"
        });
      }
      
      await wait(2200);
      
      forgeStage.classList.remove("eruption-cinematic");
      forgeStage.classList.remove("forge-erupting");
      forgeStage.classList.remove("eruption-forge-returning");
    
      if (isActivePull(pullId)) {
        setForgeEruptionState("idle");

    function acquireCinematic(type, ownerId, options = {}) {
      if (!type || !ownerId) return false;
    
      const requestedPriority = Number(options.priority || 0);
      const canInterrupt = options.interrupt === true;
    
      if (overlayState.activeCinematic) {
        const activePriority = getActiveCinematicPriority();
    
        if (!canInterrupt && requestedPriority <= activePriority) {
          overlayState.lastCinematicBlock = {
            requestedType: type,
            requestedOwner: ownerId,
            requestedPriority,
            activeType: overlayState.activeCinematic.type,
            activeOwner: overlayState.activeCinematic.ownerId,
            activePriority,
            blockedAt: Date.now()
          };
    
          return false;
        }
    
        if (canInterrupt && requestedPriority >= activePriority) {
          releaseCinematic(overlayState.activeCinematic.ownerId, {
            interruptedBy: type
          });
        }
      }
    
      overlayState.activeCinematic = {
        type,
        ownerId,
        priority: requestedPriority,
        startedAt: Date.now(),
        interruptible: options.interruptible !== false
      };
    
      overlayState.cinematicHistory.push({
        action: "acquire",
        type,
        ownerId,
        priority: requestedPriority,
        at: Date.now()
      });
    
      if (overlayState.cinematicHistory.length > 12) {
        overlayState.cinematicHistory.shift();
      }
    
      return true;
    }
    
    function releaseCinematic(ownerId, options = {}) {
      if (!overlayState.activeCinematic) return false;
    
      if (
        ownerId &&
        overlayState.activeCinematic.ownerId !== ownerId
      ) {
        return false;
      }
    
      overlayState.cinematicHistory.push({
        action: options.interruptedBy ? "interrupted" : "release",
        type: overlayState.activeCinematic.type,
        ownerId: overlayState.activeCinematic.ownerId,
        interruptedBy: options.interruptedBy || "",
        at: Date.now()
      });
    
      if (overlayState.cinematicHistory.length > 12) {
        overlayState.cinematicHistory.shift();
      }
    
      overlayState.activeCinematic = null;
    
      return true;
    }
    
    function resetCinematicOwnership(options = {}) {
      overlayState.activeCinematic = null;
      overlayState.lastCinematicBlock = null;

    function buildPendingBossDamageTicks(payload) {
      if (!payload || payload.bossActive !== true) return [];
    
      const coins = Array.isArray(payload.coins) ? payload.coins : [];
      const bossMaxHp = Math.max(1, Number(payload.bossMaxHp || 1500));
      const visibleStartHp = Math.max(
        0,
        Math.min(bossMaxHp, Number(overlayState.lastBossHp ?? bossMaxHp))
      );
    
      const finalBossHp = Math.max(
        0,
        Math.min(bossMaxHp, Number(payload.bossHp ?? visibleStartHp))
      );

      const baseCoinBossDamageByName = {
        wood: 1,
        bronze: 25,
        silver: 50,
        gold: 100,
        diamond: 500,
        rainbow: 2000,
        anti: 0,
        jackpotbooster: 0,
        kingmaker: 0,
        lucky: 0
      };

      function getBaseBossDamageForCoin(coin) {
        const rawName = String(coin?.name || coin?.coinName || "").toLowerCase();
        const key = rawName
          .replace(" coin", "")
          .replace(/\s+/g, "")
          .trim();

        return baseCoinBossDamageByName[key] ?? 0;
      }

      const coreBreachTriggerIndex = coins.findIndex((coin) =>
        coin?.jackpotHit === true ||
        coin?.coreBreach === true ||
        coin?.forgeCoreBreach === true ||
        coin?.breachTriggered === true
      );

      const hasCoreBreach = coreBreachTriggerIndex >= 0;
      const isHealing = finalBossHp > visibleStartHp;
    
      const rawCoinWeights = coins.map((coin, index) => {
        const wasDevoured = coin.devoured === true || coin.coinEaterDevoured === true;
        if (wasDevoured) return 0;

        const isCoreBreachCoin =
          hasCoreBreach &&
          index === coreBreachTriggerIndex &&
          !isHealing;

        if (isCoreBreachCoin) {
          return getBaseBossDamageForCoin(coin);
        }

        const value = Number(coin.finalValue ?? coin.value ?? 0);
    
        return isHealing
          ? Math.max(0, Math.abs(Math.min(0, value)))
          : Math.max(0, value);
      });
    
      const rawWeightTotal = rawCoinWeights.reduce((sum, value) => sum + value, 0);

      const coinOnlyFinalHp =
        hasCoreBreach && !isHealing
          ? Math.max(0, Math.min(bossMaxHp, visibleStartHp - rawWeightTotal))
          : finalBossHp;

      const delayedCoreBreachDamage =
        hasCoreBreach && !isHealing && finalBossHp < coinOnlyFinalHp
          ? coinOnlyFinalHp - finalBossHp
          : 0;

      const coinTargetFinalHp =
        delayedCoreBreachDamage > 0
          ? coinOnlyFinalHp
          : finalBossHp;

      if (delayedCoreBreachDamage > 0) {
        overlayState.pendingCoreBreachBossDamageSync = {
          payload: {
            ...payload,
            bossHp: finalBossHp,
            bossMaxHp,
            worldBossDamage: delayedCoreBreachDamage,
            bossDamage: delayedCoreBreachDamage,
            worldBossHealing: 0,
            bossHealing: 0,
            bossDefeated: finalBossHp <= 0,
            defeated: finalBossHp <= 0,
            bossEncounterState: finalBossHp <= 0 ? "defeated" : "active",
            encounterState: finalBossHp <= 0 ? "defeated" : "active"

          options: {
            source: "core-breach-delayed-boss-damage"
          }
        };
      } else {
        overlayState.pendingCoreBreachBossDamageSync = null;
      }

      const totalHpDelta = coinTargetFinalHp - visibleStartHp;
    
      if (totalHpDelta === 0 || coins.length === 0) return [];
    
      let runningHp = visibleStartHp;
      const ticks = [];
    
      coins.forEach((coin, index) => {
        let hpDelta = 0;
        const coinWeight = rawCoinWeights[index] || 0;
    
        if (coinWeight > 0) {
          const desiredDelta = isHealing ? coinWeight : -coinWeight;
          const remainingDelta = coinTargetFinalHp - runningHp;
    
          hpDelta = isHealing
            ? Math.min(desiredDelta, Math.max(0, remainingDelta))
            : Math.max(desiredDelta, Math.min(0, remainingDelta));
        } else if (rawWeightTotal <= 0 && index === coins.length - 1) {
          hpDelta = coinTargetFinalHp - runningHp;
        }
    
        const nextHp = Math.max(
          0,
          Math.min(bossMaxHp, runningHp + hpDelta)
        );
    
        const tickDefeated = nextHp <= 0;
        const tickDamage = hpDelta < 0 ? Math.abs(hpDelta) : 0;
        const tickHealing = hpDelta > 0 ? hpDelta : 0;
    
        if (tickDamage > 0 || tickHealing > 0) {
          ticks.push({
            payload: {
              ...payload,
              bossHp: nextHp,
              bossMaxHp,
              worldBossDamage: tickDamage,
              bossDamage: tickDamage,
              worldBossHealing: tickHealing,
              bossHealing: tickHealing,
              bossDefeated: tickDefeated,
              defeated: tickDefeated,
              bossEncounterState: tickDefeated ? "defeated" : "active",
              encounterState: tickDefeated ? "defeated" : "active"
            },
            damage: Math.abs(hpDelta),
            index
          });
        }
    
        runningHp = nextHp;
      });
    
      return ticks;

        payload.bossDefeated === true ||
        payloadEncounterState === "defeated";

      if (isExplicitDefeatPayload && options.allowDefeatStateSync !== true) {

        isExplicitDefeatPayload
          ? "defeated"
          : payload.bossEncounterState || payload.encounterState || "active";

        source: options.source || "coinForgePull",
        payload
      });

      const healingAmount = Number(payload.worldBossHealing || payload.bossHealing || 0);

      if (
        bossHp > 0 &&
        healingAmount > 0 &&
        options.suppressBossHealReaction !== true
      ) {
        triggerBossHealReaction(bossType, payload, options);
      }
      
      if (
        bossHp > 0 &&
        healingAmount <= 0 &&
        options.suppressBossHurtReaction !== true
      ) {
        triggerBossDamageReaction(bossType, payload, options);
      }

          bossType.toUpperCase();

    function clearSlotEffects(target, options = {}) {

      if (options.restart === true) {

    function addOwnedElementEffect(pullId, element, className, duration = null, options = {}) {
      if (!isActivePull(pullId)) return;

      const timerKey = className.replace(/[^a-zA-Z0-9]/g, "_");

      if (!element.__ownedEffectTimers) {
        element.__ownedEffectTimers = {};
      }

      if (element.__ownedEffectTimers[timerKey]) {
        clearTimeout(element.__ownedEffectTimers[timerKey]);
        delete element.__ownedEffectTimers[timerKey];
      }

      if (options.restart === true) {
        element.classList.remove(className);
        void element.offsetWidth;
      }

      element.classList.add(className);

      if (duration !== null) {
        element.__ownedEffectTimers[timerKey] = setTimeout(() => {
          element.classList.remove(className);
          delete element.__ownedEffectTimers[timerKey];
        }, duration);
      }
    }

      pullId,

      className,
      duration,

      addOwnedElementEffect(
        pullId,
        element,
        className,
        null,
        options

      if (duration !== null) {
        const timerKey = `display_${className.replace(/[^a-zA-Z0-9]/g, "_")}`;

        if (!element.__ownedEffectTimers) {
          element.__ownedEffectTimers = {};
        }

        if (element.__ownedEffectTimers[timerKey]) {
          clearTimeout(element.__ownedEffectTimers[timerKey]);
          delete element.__ownedEffectTimers[timerKey];

    function getFinalFrameCoinKey(finalCoin) {

    function getForgeTimingProfile(pullCount) {
      const count = Number(pullCount) || 1;
    
      if (count <= 1) {
        return { growDuration: 2600, frameDelay: 16, totalFrames: 165 };
      }
    
      if (count === 2) {
        return { growDuration: 2200, frameDelay: 14, totalFrames: 135 };
      }
    
      if (count === 3) {
        return { growDuration: 1900, frameDelay: 13, totalFrames: 115 };
      }

    async function playFrameCoinSequence(slot, slotWrap, finalCoin, pullId) {
      if (!isActivePull(pullId)) return;
      if (!slot || !slotWrap) return;
    
      slotWrap.getAnimations().forEach(anim => anim.cancel());
    
      let frame = 1;
      let currentCoinKey = "Bronze";
    
      slotWrap.style.transform = "scale(0.08)";
      slotWrap.style.filter = "brightness(2.3) blur(2px)";
    
      slot.src = getCachedCoinFrame(currentCoinKey, frame);
      slot.style.opacity = "1";
    
      const growAnim = slotWrap.animate(
        [
          { transform: "scale(0.08)", filter: "brightness(2.3) blur(2px)" },
          { transform: "scale(0.14)", filter: "brightness(2.1) blur(1px)", offset: 0.18 },
          { transform: "scale(0.26)", filter: "brightness(1.95) blur(0.5px)", offset: 0.38 },
          { transform: "scale(0.52)", filter: "brightness(1.7)", offset: 0.60 },
          { transform: "scale(0.88)", filter: "brightness(1.45)", offset: 0.82 },
          { transform: "scale(1.22)", filter: "brightness(1.18)", offset: 1 }
        ],
        {
          duration: 2400,
          easing: "cubic-bezier(0.16, 1, 0.3, 1)",
          fill: "forwards"
        }
      );
    
      const frameDelay = 16;
      const totalFrames = 150;
      const teaseCoins = getTeaseCoinPool(finalCoin);
      const finalFrameCoinKey = getFinalFrameCoinKey(finalCoin);
          
      for (let i = 0; i < totalFrames; i++) {
        await waitForForgeRevealResume(pullId);
      
        if (!isActivePull(pullId)) {
          growAnim.cancel();
          return;
        }

        frame++;
    
        if (frame > coinFrameCount) {
          frame = 1;
        }
    
        const progress = i / totalFrames;

        if (frame === 9) {
          if (progress > 0.75) {
            currentCoinKey = teaseCoins[Math.floor(Math.random() * teaseCoins.length)];
          } else {
            currentCoinKey = getProofCoinKey(currentCoinKey);
          }
        
          setForgePressureForCoin(currentCoinKey, progress);
        }
    
        slot.src = getCachedCoinFrame(currentCoinKey, frame);
    
        let adjustedDelay = frameDelay;
    
        if (frame <= 3 || frame >= 14) {
          adjustedDelay = Math.max(8, frameDelay - 4);
        }
    
        if (frame >= 7 && frame <= 10) {
          adjustedDelay = frameDelay + 4;
        }
        
        // Tiny pre-lock hold near the end of the animation.
        // This creates suspense without adding a second animation phase.
        const isFinalTeaseWindow = progress > 0.90;
        const isThinCoinFrame = frame === 8 || frame === 9;
        
        if (isFinalTeaseWindow && isThinCoinFrame) {
          currentCoinKey = finalFrameCoinKey;
          slot.src = getCachedCoinFrame(finalFrameCoinKey, frame);
          setForgePressureForCoin(finalFrameCoinKey, 1);
        
          if (!slot.dataset.hammerSoundPlayed) {
            slot.dataset.hammerSoundPlayed = "true";
            if (!isActivePull(pullId)) {
              growAnim.cancel();
              return;
            }

            playForgeHammerSound(pullId);
            triggerSparkStrikeGif(slot, pullId);
            triggerSocketCompression(slot, pullId);
          }
        
          await wait(15);
          break;
        }
        
        await wait(adjustedDelay);
      }
    
      growAnim.cancel();

      slotWrap.style.transform = "scale(1.22)";
      slotWrap.style.filter = "brightness(1.18)";
    
      return {
        frame,
        currentCoinKey
      };
    }
    
    async function growAndFakeoutSlot(slot, finalCoin, index, pullId, pullCount = 1) {
      if (!isActivePull(pullId)) return;
      const slotWrap = slot.closest(".slot-wrap");

    async function playWoodBurnupIfNeeded(slot, finalCoin, pullId) {
      if (!isActivePull(pullId)) return;
      if (!slot || !finalCoin || finalCoin.name !== "Wood Coin") return;
      if (slot.dataset.woodBurned === "true") return;
      slot.dataset.woodBurned = "true";
    
      const event = window.currentForgeEvent || {};
      const finalBurnPile = Math.max(0, Math.min(35, Number(event.burnPile || 0)));
    
      const currentWoodIndex = Number(window.currentWoodBurnIndex || 0);
      const totalWoodThisPull = Math.max(1, Number(window.currentWoodBurnTotal || 1));
    
      let remainingToIgnition = 0;
    
      if (event.forgeIgnited) {
        remainingToIgnition = Math.max(0, totalWoodThisPull - currentWoodIndex - 1);
      } else {
        const estimatedBurnPileForThisWood =
          finalBurnPile - (totalWoodThisPull - currentWoodIndex - 1);
    
        remainingToIgnition = Math.max(
          0,
          35 - Math.max(0, estimatedBurnPileForThisWood)
        );
      }
    
      window.currentWoodBurnIndex = currentWoodIndex + 1;

      if (remainingToIgnition === 0) {
        playForgeIgnitionSound(pullId);
      }
    
      setSlotState(slot, "burning", { pullId, coin: finalCoin.name });
      addCoinEffect(pullId, slot, "wood-burn-prep", 700, { restart: true });
      await wait(700);
    
      const stageRect = forgeStage.getBoundingClientRect();
      const coinRect = slot.getBoundingClientRect();
    
      const coinCenterX = coinRect.left + coinRect.width / 2 - stageRect.left;
      const coinCenterY = coinRect.top + coinRect.height / 2 - stageRect.top + 8;
    
      const fire = document.createElement("img");
      fire.className = "wood-burn-burst";
      fire.src = "images/vfx/FireBurst_64x64.gif";
      fire.alt = "";
      fire.style.left = `${coinCenterX}px`;
      fire.style.top = `${coinCenterY}px`;
    
      const counter = document.createElement("div");
      counter.className = "wood-burn-count";
      counter.textContent = remainingToIgnition;
      counter.style.left = `${coinCenterX}px`;
      counter.style.top = `${coinCenterY}px`;
    
      forgeStage.appendChild(fire);
      forgeStage.appendChild(counter);
      
     playWoodBurnSound(pullId);
      
      if (remainingToIgnition === 0) {
        triggerForgeIgnitionVisuals(pullId);
      }
    
      await wait(320);
      slot.style.opacity = "0";
    
      await wait(180);
      counter.classList.add("visible");
    
      await wait(120);

      fire.style.display = "none";
      
      await wait(640);
      
      fire.remove();
      counter.remove();
    }

    function getForgeInstabilityPayload(finalCoin) {
      const raw = finalCoin?.raw || {};
      const structured = raw.instability || {};

      const effect =
        structured.effect ||
        raw.forgeInstabilityEffect ||
        "";

      return {
        effect,
        originalValue:
          structured.originalValue ??
          raw.forgeInstabilityOriginalValue ??
          null,
        roll:
          structured.roll ??
          raw.forgeInstabilityRoll ??
          null,
        source: raw.instability ? "structured" : "legacy"
      };
    }
    
    function resolveForgeInstabilityConflict(finalCoin) {
      const raw = finalCoin?.raw || {};
      const instability = getForgeInstabilityPayload(finalCoin);

      if (!instability.effect) {
        return {
          allowed: false,
          reason: "no-instability-effect",
          instability
        };
      }

      if (raw.jackpotHit === true) {
        return {
          allowed: true,
          reason: "eruption-plus-instability",
          instability
        };
      }

      if (raw.devoured === true) {
        return {
          allowed: false,
          reason: "devour-takes-priority",
          instability
        };
      }

      if (raw.omenCorrupted === true) {
        return {
          allowed: true,
          reason: "corruption-plus-instability",
          instability
        };
      }

      return {
        allowed: true,
        reason: "instability-allowed",
        instability
      };
    }
    
    async function triggerForgeInstabilityVisual(slot, finalCoin, pullId) {
      if (!isActivePull(pullId)) return;
      if (!slot || !finalCoin || !finalCoin.raw) return;

      const conflict = resolveForgeInstabilityConflict(finalCoin);

      const instability = conflict.instability;

      overlayState.lastInstabilityConflict = {
        pullId,
        coinName: finalCoin.name || "",
        effect: instability.effect || "",
        originalValue: instability.originalValue,
        roll: instability.roll,
        source: instability.source,
        allowed: conflict.allowed,
        reason: conflict.reason
      };

      if (!conflict.allowed) return;

      const effect = instability.effect || "";
      const slotWrap = slot.closest(".slot-wrap");
      if (!slotWrap) return;

      const ownedEffect = activateForgeInstabilityEffect({
        pullId,
        slotWrap,
        slot,
        finalCoin,
        effect
      });

      if (!ownedEffect) return;

      await wait(ownedEffect.waitMs);
    }
    
    async function spinSlot(slot, finalCoin, index, shouldLock, pullId, pullCount = 1) {
      if (!shouldLock) {
        const coin = randomCycleCoin();
        slot.src = coinFileForSlot(coin, index);
        return;
      }
    
      await waitForForgeRevealResume(pullId);
    
      if (!isActivePull(pullId)) return;
    
      await growAndFakeoutSlot(slot, finalCoin, index, pullId, pullCount);

      if (!isActivePull(pullId)) return;
      
      const slotWrap = slot.closest(".slot-wrap");
      const instabilityEffect =
        finalCoin.raw &&
        finalCoin.raw.instability &&
        finalCoin.raw.instability.effect
          ? finalCoin.raw.instability.effect
          : "";

      const hasInstabilityEffect =
        instabilityEffect === "Overcharged" ||
        instabilityEffect === "Scorched" ||
        instabilityEffect === "BurnedAway";

      if (slotWrap && !hasInstabilityEffect) {
        addSlotEffect(pullId, slotWrap, `landed-${finalCoin.className}`);
      }

      clearCinematicStageClasses();

      if (!hasInstabilityEffect) {
        addStageEffect(pullId, `reveal-${finalCoin.className}`);
        addStageEffect(pullId, "impact", 180, { restart: true });

        if (
          finalCoin.name === "Rainbow Coin" ||
          finalCoin.name === "Kingmaker Coin" ||
          finalCoin.name === "Jackpot Booster"
        ) {
          triggerImpactFlash(pullId);
        }
        
        triggerSlotAura(finalCoin, slot, pullId);

        if (finalCoin.raw && finalCoin.raw.omenCorrupted) {
          triggerCorruptionWave(pullId, slotWrap);
        }

        const cinematicPromise = playFinalCinematic(finalCoin, slot, pullId);

        await wait(160);

        // Impact cleanup is now owned by addStageEffect(...).
        
        await cinematicPromise;
      }

      // Instability is now triggered inside growAndFakeoutSlot immediately after socket impact.

      if (!isActivePull(pullId)) return;

      await playWoodBurnupIfNeeded(slot, finalCoin, pullId);

      if (finalCoin.raw && finalCoin.raw.comboBroken) {
        queueComboDisplay("broken", null, pullId);
      }
      
      if (
        finalCoin.raw &&
        Array.isArray(finalCoin.raw.comboMilestones) &&
        finalCoin.raw.comboMilestones.length > 0
      ) {
        finalCoin.raw.comboMilestones.forEach(milestone => {
          queueComboDisplay("milestone", milestone, pullId);
        });
      }
      
      if (
        finalCoin.raw &&
        Array.isArray(finalCoin.raw.achievements) &&
        finalCoin.raw.achievements.length > 0
      ) {
        for (const achievementId of finalCoin.raw.achievements) {
          queueAchievementDisplay(
            buildAchievementPopupData(window.currentForgeEvent || {}, achievementId)
          );
        }
      }
      
      clearActiveSlotFocus();
      clearCinematicStageClasses();
    }

        value.startsWith("http://") ||
        value.startsWith("https://")

        return value;
      }

      return `images/badges/${value}.png`;

    function queueComboDisplay(type, value = null, pullId) {
      if (!isActivePull(pullId)) return;

      const ownerKey = getComboOwnerKey();

      if (type === "broken") {
        clearComboMilestoneHistoryForOwner(ownerKey);
      }

      if (type === "milestone") {
        const milestoneKey = `${ownerKey}:milestone:${value ?? ""}`;

        if (overlayState.comboMilestoneHistory.has(milestoneKey)) return;

        overlayState.comboMilestoneHistory.add(milestoneKey);
      }

      const comboKey = `${pullId}:${type}:${value ?? ""}`;

      if (overlayState.comboDisplayKeys.has(comboKey)) return;

      overlayState.comboDisplayKeys.add(comboKey);
      comboDisplayQueue.push({ type, value, pullId });
      processComboDisplayQueue();
    }

    function clearComboMilestoneHistoryForOwner(ownerKey) {
      const prefix = `${ownerKey}:`;

      for (const key of Array.from(overlayState.comboMilestoneHistory)) {
        if (key.startsWith(prefix)) {
          overlayState.comboMilestoneHistory.delete(key);
        }
      }
    }

      comboDisplayRunId++;

      comboDisplayActive = false;
      overlayState.comboDisplayKeys.clear();

        comboPopup.className = "combo-popup";

    async function processComboDisplayQueue() {
      if (comboDisplayActive) return;
    
      comboDisplayActive = true;
      const runId = comboDisplayRunId;
    
      while (comboDisplayQueue.length > 0 && runId === comboDisplayRunId) {
        const item = comboDisplayQueue.shift();
        if (!isActivePull(item.pullId)) continue;

        showComboPopup(item.type, item.value, item.pullId);
        if (item.type === "broken") {
          await wait(1900);
        } else {
          switch (item.value) {
            case 100:
              await wait(3400);
              break;
        
            case 75:
              await wait(3000);
              break;
        
            case 50:
              await wait(2700);
              break;
        
            default:
              await wait(2400);
              break;
          }
        }
        if (!isActivePull(item.pullId)) {
          clearComboDisplayState();
          return;
        }

      }

    async function runForgeRevealExternal(event) {
      const pullId = event.pullId;

      if (!isActivePull(pullId)) return;

      clearComboDisplayState();
      clearRevealClasses();
      window.currentForgeEvent = event;

      setForgeIgnitedState(event.forgeIgnitedActive === true);
            
     const rawCoins = Array.isArray(event.coins) ? event.coins : [];
      const results = rawCoins.map(getCoinDefinition);
      const pullCount = Math.max(1, Math.min(5, Number(event.pullCount || results.length || 1)));
      window.currentWoodBurnIndex = 0;
      window.currentWoodBurnTotal = results.filter(coin => coin.name === "Wood Coin").length;

      prepareBossVisualDamageForActiveEvent(event);
      
      if (results.length === 0) {
        hideForgeStage();
        clearPlayerIdentity();
        slotRow.innerHTML = "";

        resetForgePressureLifecycleVisuals();

        clearSlotStates();

        resetForgeRuntimeOwnership({
          includePersistent: true,
          clearPullOwnership: true
        });
        stopOwnedAudio();

        return;
      }
      
      clearStageEffects();
      stopCoreBreachPendingSequence();
      clearForgeResonanceResult();
      slotRow.classList.remove("resonance-result-hidden");
      
      showForgeStage();
      
      const highestClass = highestRarityClass(results);
      renderPlayerIdentity(event, highestClass);

      await wait(0);

      const existingSlots = document.querySelectorAll(".slot-coin");
      
      if (existingSlots.length !== pullCount) {
        createSlots(pullCount);
      }
      
      setForgeChargeState("charged");

      const slots = Array.from(document.querySelectorAll(".slot-coin"));

      if (pullCount === 1) {
      
        await spinSlot(
          slots[0],
          results[0] || results[results.length - 1],
          0,
          true,
          pullId,
          pullCount
        );
        
        applyNextPendingBossDamageTick();
        await wait(120);
      } else {
      
        const staggerDelay = Math.max(
          420,
          1050 - (pullCount * 120)
        );
      
        const activeSpinPromises = [];

        for (let i = 0; i < slots.length; i++) {
        
          while (
            overlayState.forgeRevealSuspension &&
            overlayState.forgeRevealSuspension.ownerId === pullId
          ) {
            await wait(50);
          }
        
          const slot = slots[i];
        
          activeSpinPromises.push(
            spinSlot(
              slot,
              results[i] || results[results.length - 1],
              i,
              true,
              pullId,
              pullCount
            ).then(async () => {
              applyNextPendingBossDamageTick();
              await wait(120);
            })
          );
        
          if (i < slots.length - 1) {
            await wait(staggerDelay);
          }
        }
        
        await Promise.all(activeSpinPromises);
      }
      
      if (
        overlayState.pendingEruption &&
        overlayState.pendingEruption.pullId === pullId
      ) {
        const pendingEruption = overlayState.pendingEruption;
        overlayState.pendingEruption = null;
        
        await wait(180);
        
        await triggerForgeEruptionLifecycle(
          pullId,
          {
            pressureAfter: pendingEruption.pressureAfter,
            source: pendingEruption.source,
            skipBuildup: true
          }
        );

        const coreBreachDefeatedBoss =
          event.bossDefeated === true ||
          event.defeated === true ||
          String(event.bossEncounterState || "").toLowerCase() === "defeated";

        if (overlayState.bossEncounterState === "defeated") {
          await waitForBossDefeatCleanup();
        
          clearStageRevealEffects();
          clearStageEffects();
          stopCoreBreachPendingSequence();
          cinematicBurst.classList.remove("active");

          hideForgeStage();
          clearPlayerIdentity();
        
          await wait(350);
        
          clearForgeResonanceResult();
          clearSlotStates();
          resetForgeInstabilityOwnership({ includePersistent: true });
          slotRow.classList.remove("resonance-result-hidden");
          slotRow.innerHTML = "";
        
          resetForgePressureLifecycleVisuals();

          resetForgeRuntimeOwnership({
            includePersistent: true,
            clearPullOwnership: true
          });

          stopOwnedAudio();
          clearComboDisplayState();
        
          return;
        }

        showForgeResonanceResult(event, results, pullId);

        await wait(
          coreBreachDefeatedBoss
            ? Math.max(5200, Number(event.displayMs || 0))
            : Math.max(2600, Number(event.displayMs || 0))
        );

        hideForgeStage();
        clearPlayerIdentity();
        clearStageEffects();
        stopCoreBreachPendingSequence();
        cinematicBurst.classList.remove("active");
        
        await wait(350);
        
        clearForgeResonanceResult();
        clearSlotStates();
        resetForgeInstabilityOwnership({ includePersistent: true });
        slotRow.classList.remove("resonance-result-hidden");
        slotRow.innerHTML = "";
        
        resetForgePressureLifecycleVisuals();
        
        resetForgeRuntimeOwnership({
          includePersistent: true,
          clearPullOwnership: true
        });

        stopOwnedAudio();
        clearComboDisplayState();

        return;
      }
      
      if (overlayState.bossEncounterState === "defeated") {
        await waitForBossDefeatCleanup();
      
        clearStageRevealEffects();
        cinematicBurst.classList.remove("active");

        hideForgeStage();
        clearPlayerIdentity();
      
        await wait(350);
      
        clearSlotStates();
        resetForgeInstabilityOwnership({ includePersistent: true });
        slotRow.innerHTML = "";
      
        resetForgePressureLifecycleVisuals();

        resetForgeRuntimeOwnership({
          includePersistent: true,
          clearPullOwnership: true
        });

        stopOwnedAudio();
        clearComboDisplayState();
      
        return;
      }
      
      addStageEffect(pullId, `reveal-${highestClass}`);
      
      triggerFinalSlotPulse(pullId);
      await wait(180);

      await wait(event.displayMs || 1500);

      clearStageRevealEffects();
      cinematicBurst.classList.remove("active");
      
      hideForgeStage();
      clearPlayerIdentity();
      
      await wait(350);
      
      clearSlotStates();
      resetForgeInstabilityOwnership({ includePersistent: true });
      slotRow.innerHTML = "";
      
      resetForgePressureLifecycleVisuals();
      
      resetForgeRuntimeOwnership({
        includePersistent: true,
        clearPullOwnership: true
      });
      stopOwnedAudio();
      clearComboDisplayState();
      
    }

    async function processForgeQueue() {
      if (forgeEventPlaying) return;
    
      forgeEventPlaying = true;
    
      while (overlayState.queue.length > 0) {
        const event = overlayState.queue.shift();
        const pullId = event.pullId || `forge-${Date.now()}`;
    
        overlayState.isAnimating = true;
        overlayState.activePayload = event;
        overlayState.activePullId = pullId;
    
        const cinematicAcquired = acquireCinematic(
          "forgeReveal",
          pullId,
          {
            priority: 10,
            interrupt: false
          }
        );
    
        if (!cinematicAcquired) {
          console.warn("Forge reveal skipped because another cinematic owns the stage.", {
            activeCinematic: overlayState.activeCinematic,
            pullId
          });
    
          continue;
        }
    
        try {
          await runForgeRevealExternal(event);
        } finally {
          releaseCinematic(pullId);
        }

        if (overlayState.bossEncounterState === "defeated") {
          await waitForBossDefeatCleanup();
        }
      }
    
      if (
        overlayState.deferredBossWorldClearPayload &&
        overlayState.bossEncounterState !== "defeated" &&
        !overlayState.bossDefeatCleanupPromise
      ) {
        const deferredClearPayload = overlayState.deferredBossWorldClearPayload;
        overlayState.deferredBossWorldClearPayload = null;

        overlayState.bossWorldSyncSuppressed = true;
        overlayState.pendingBossDamageSync = null;
        overlayState.pendingCoreBreachBossDamageSync = null;

        setBossEncounterState("escaped", {
          source: "deferred-boss-clear-after-forge-queue",
          payload: deferredClearPayload
        });

        setTimeout(() => {
          clearBossWorldState({ force: true });
        }, 900);
      }

      forgeEventPlaying = false;
      
    }
