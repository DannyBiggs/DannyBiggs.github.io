<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coin Forge Overlay</title>

  <script src="https://cdn.jsdelivr.net/npm/@streamerbot/client/dist/streamerbot-client.js"></script>

  <style>
  @font-face {
    font-family: "CoinForgeName";
    src: url("fonts/DungeonDepths-owJWV.ttf") format("truetype");
    font-display: swap;
  }
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    body {
      color: #e8d7a2;
      position: relative;
    }

    .overlay-root {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .screen-border-fx {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 40;
      opacity: 0;
      box-shadow: inset 0 0 90px rgba(255, 180, 40, 0);
    }
    
    .screen-border-fx.mythic {
      animation: screenMythicBorder 1.1s ease-out;
    }
    
    .screen-border-fx.cursed {
      animation: screenCursedBorder 0.9s ease-out;
    }
    
    .screen-border-fx.jackpot {
      animation: screenJackpotBorder 0.9s ease-out;
    }
    
    @keyframes screenMythicBorder {
      0% { opacity: 0; box-shadow: inset 0 0 0 rgba(255, 180, 40, 0); }
      30% { opacity: 1; box-shadow: inset 0 0 120px rgba(255, 190, 70, 0.75), inset 0 0 220px rgba(255, 90, 20, 0.28); }
      100% { opacity: 0; box-shadow: inset 0 0 40px rgba(255, 140, 30, 0); }
    }
    
    @keyframes screenCursedBorder {
      0% { opacity: 0; box-shadow: inset 0 0 0 rgba(80, 170, 255, 0); }
      30% { opacity: 1; box-shadow: inset 0 0 120px rgba(80, 170, 255, 0.65), inset 0 0 220px rgba(20, 60, 255, 0.28); }
      100% { opacity: 0; box-shadow: inset 0 0 40px rgba(80, 170, 255, 0); }
    }
    
    @keyframes screenJackpotBorder {
      0% { opacity: 0; box-shadow: inset 0 0 0 rgba(255, 40, 40, 0); }
      30% { opacity: 1; box-shadow: inset 0 0 120px rgba(255, 55, 55, 0.75), inset 0 0 220px rgba(120, 0, 0, 0.35); }
      100% { opacity: 0; box-shadow: inset 0 0 40px rgba(255, 40, 40, 0); }
    }
    
    .embers {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    body.forge-active .embers {
      opacity: 1;
    }

    .ember {
      position: absolute;
      bottom: -20px;
      width: 4px;
      height: 4px;
      background: #ffb347;
      border-radius: 50%;
      opacity: 0.45;
      box-shadow: 0 0 10px rgba(255,179,71,0.8);
      animation: riseEmber linear infinite;
    }

    .ember:nth-child(1) { left: 8%; animation-duration: 9s; animation-delay: 0s; }
    .ember:nth-child(2) { left: 20%; animation-duration: 13s; animation-delay: 2s; }
    .ember:nth-child(3) { left: 36%; animation-duration: 11s; animation-delay: 5s; }
    .ember:nth-child(4) { left: 52%; animation-duration: 15s; animation-delay: 1s; }
    .ember:nth-child(5) { left: 68%; animation-duration: 10s; animation-delay: 4s; }
    .ember:nth-child(6) { left: 86%; animation-duration: 14s; animation-delay: 3s; }

    @keyframes riseEmber {
      0% { transform: translateY(0) scale(0.7); opacity: 0; }
      15% { opacity: 0.6; }
      100% { transform: translateY(-110vh) scale(1.4); opacity: 0; }
    }

    .forge-simulator {
      width: min(96vw, 1280px);
      text-align: center;
      pointer-events: none;
    }

    .forge-stage {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      margin: 0 auto;
      overflow: hidden;
      border-radius: 0;
      border: none;
      background: transparent;
      box-shadow: none;
      /*
      border-radius: 16px;
      border: 2px solid rgba(58, 42, 24, 0.85);
      background: transparent;
      box-shadow:
        0 0 28px rgba(255,179,71,0.16),
        inset 0 0 60px rgba(255,120,32,0.08);
      */
      opacity: 0;
      transform: scale(0.985);
      transition: opacity 1.15s ease, transform 1.15s ease;
    }

    .forge-stage.visible {
      opacity: 1;
      transform: scale(1);
    }

    .forge-background {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
      pointer-events: none;
      z-index: 1;
    }

    .forge-background-glow {
      position: absolute;
      inset: 0;
    
      width: 100%;
      height: 100%;
    
      object-fit: contain;
      image-rendering: pixelated;
    
      pointer-events: none;
    
      opacity: 0;
    
      z-index: 2;
    
      mix-blend-mode: screen;
    }

    .forge-light-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      opacity: 0.55;
      background:
        radial-gradient(circle at 50% 34%, rgba(255, 115, 20, 0.55), transparent 7%),
        radial-gradient(circle at 50% 84%, rgba(255, 95, 20, 0.45), transparent 10%),
        radial-gradient(circle at 16% 41%, rgba(255, 130, 25, 0.38), transparent 8%),
        radial-gradient(circle at 84% 41%, rgba(255, 130, 25, 0.38), transparent 8%),
        radial-gradient(circle at 61% 72%, rgba(255, 85, 15, 0.35), transparent 8%);
      mix-blend-mode: screen;
      filter: blur(8px);
      animation: forgeLightWake 2.2s ease-in-out infinite alternate;
    }

    @keyframes forgeLightWake {
      from { opacity: 0.35; transform: scale(0.99); }
      to { opacity: 0.75; transform: scale(1.015); }
    }

    .forge-glow {
      position: absolute;
      left: 50%;
      top: 31%;
      width: 170px;
      height: 170px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background:
        radial-gradient(circle,
          rgba(255,140,40,0.60) 0%,
          rgba(255,140,40,0.18) 45%,
          transparent 75%);
      filter: blur(12px);
      animation: forgePulse 2s ease-in-out infinite alternate;
      z-index: 3;
    }

    @keyframes forgePulse {
      from { opacity: 0.55; transform: translate(-50%, -50%) scale(0.9); }
      to { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
    }

    .forge-stage.charging .forge-background-glow {
      opacity: var(--forge-pressure-opacity, 0.045);
      filter:
        brightness(var(--forge-pressure-brightness, 1))
        saturate(var(--forge-pressure-saturation, 1))
        hue-rotate(var(--forge-pressure-hue, 0deg));
    
      transition:
        opacity 420ms ease,
        filter 420ms ease;
    }
    
    .forge-stage.charging .forge-glow {
      opacity: var(--forge-core-opacity, 0.72);
      transform:
        translate(-50%, -50%)
        scale(var(--forge-core-scale, 1));
      transition: opacity 90ms linear, transform 90ms linear;
    }
    
    .forge-stage.pressure-cursed .forge-background-glow {
      mix-blend-mode: screen;
    }
    
    @keyframes forgeChargeGlow {
      from {
        opacity: 0.18;
        filter: brightness(1);
      }
    
      to {
        opacity: 0.95;
        filter: brightness(1.5);
      }
    }

    .forge-stage.charged .forge-background-glow {
      opacity: 0.85;
      filter: brightness(1.35);
    }

    .forge-stage.escalate-warm .forge-background-glow {
      opacity: 0.9;
      filter: brightness(1.48) saturate(1.18);
    }
    
    .forge-stage.escalate-cursed .forge-background-glow {
      opacity: 0.72;
      filter: brightness(1.08) saturate(0.82) hue-rotate(155deg);
    }
    
    .slot-wrap.active-slot {
      filter: brightness(1.18) drop-shadow(0 0 18px rgba(255, 185, 80, 0.55));
    }
    
    .slot-wrap.inactive-slot {
      filter: brightness(0.72) saturate(0.85);
    }
    
    .slot-row {
      position: absolute;
      left: 50%;
      top: 46%;
      width: 72%;
      transform: translate(-50%, -50%);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0px;
      z-index: 5;
    }

    .slot-wrap {
      position: relative;
      width: 240px;
      height: 240px;
    
      display: flex;
      align-items: center;
      justify-content: center;
    
      flex-shrink: 0;
    }

    .slot-wrap.lock-impact {
      animation: slotWrapRecoil 0.34s ease-out;
    }
    
    @keyframes slotWrapRecoil {
      0% { transform: scale(1); }
      28% { transform: scale(1.08) translateY(-2px); }
      55% { transform: scale(0.97) translateY(1px); }
      78% { transform: scale(1.025) translateY(0); }
      100% { transform: scale(1); }
    }

    .slot-wrap.socket-compress {
      animation: socketCompress 0.36s steps(5, end) forwards;
    }
    
    @keyframes socketCompress {
      0% { transform: translateY(0px) scale(1); filter: brightness(1); }
      22% { transform: translateY(10px) scaleX(1.08) scaleY(0.86); filter: brightness(1.28); }
      48% { transform: translateY(-4px) scaleX(0.96) scaleY(1.08); filter: brightness(1.12); }
      72% { transform: translateY(2px) scaleX(1.02) scaleY(0.97); filter: brightness(1.04); }
      100% { transform: translateY(0px) scale(1); filter: brightness(1); }
    }

    .slot-socket-ring {
      position: absolute;
      inset: 13%;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      border: 3px solid rgba(255, 235, 170, 0.95);
      box-shadow:
        0 0 8px rgba(255, 210, 120, 0.45),
        inset 0 0 8px rgba(255, 150, 40, 0.25);
      transform: scale(0.55);
    }
    
    .slot-socket-ring.active {
      animation: socketRingLock 0.42s ease-out;
    }
    
    .slot-socket-ring.common {
      border-color: rgba(220, 220, 220, 0.7);
      box-shadow: 0 0 10px rgba(220, 220, 220, 0.35);
    }
    
    .slot-socket-ring.rare {
      border-color: rgba(100, 180, 255, 0.9);
      box-shadow:
        0 0 16px rgba(100, 180, 255, 0.65),
        inset 0 0 18px rgba(80, 150, 255, 0.35);
    }
    
    .slot-socket-ring.epic {
      border-color: rgba(195, 95, 255, 0.9);
      box-shadow:
        0 0 18px rgba(195, 95, 255, 0.7),
        inset 0 0 18px rgba(160, 70, 255, 0.35);
    }
    
    .slot-socket-ring.legendary {
      border-color: rgba(255, 220, 95, 0.95);
      box-shadow:
        0 0 22px rgba(255, 190, 70, 0.8),
        inset 0 0 20px rgba(255, 150, 40, 0.45);
    }
    
    .slot-socket-ring.mythic {
      border-color: rgba(255, 245, 180, 1);
      box-shadow:
        0 0 34px rgba(255, 230, 120, 1),
        0 0 62px rgba(255, 120, 30, 0.55),
        inset 0 0 30px rgba(255, 180, 50, 0.65);
    }
    
    .slot-socket-ring.rainbow {
      border-color: rgba(255, 255, 255, 1);
      box-shadow:
        0 0 30px rgba(255, 255, 255, 0.95),
        0 0 58px rgba(255, 80, 220, 0.65),
        0 0 76px rgba(80, 220, 255, 0.55);
    }
    
    .slot-socket-ring.cursed {
      border-color: rgba(90, 190, 255, 0.95);
      box-shadow:
        0 0 32px rgba(90, 190, 255, 0.95),
        0 0 62px rgba(30, 80, 255, 0.55),
        inset 0 0 30px rgba(20, 80, 255, 0.6);
    }
    
    @keyframes socketRingLock {
      0% {
        opacity: 0;
        transform: scale(0.72) rotate(0deg);
      }
    
      18% {
        opacity: 1;
        transform: scale(1.02) rotate(8deg);
      }
    
      58% {
        opacity: 0.85;
        transform: scale(0.96) rotate(-3deg);
      }
    
      100% {
        opacity: 0;
        transform: scale(1.12) rotate(0deg);
      }
    }
  
      
    .slot-impact-flash {
      position: absolute;
      inset: 16%;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      background: radial-gradient(circle, rgba(255, 235, 170, 0.62) 0%, rgba(255, 170, 60, 0.24) 34%, transparent 72%);
      transform: scale(0.45);
    }
    
    .slot-impact-flash.active {
      animation: slotImpactFlash 0.42s ease-out;
    }

    .pixel-spark-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 3;
      image-rendering: pixelated;
    }
    
    .pixel-spark {
      position: absolute;
      left: 50%;
      top: 58%;
      opacity: 0;
      image-rendering: pixelated;
      transform: translate(-50%, -50%);
    }
    
    .pixel-spark.fast {
      width: 16px;
      height: 6px;
      background: #fff2a6;
      box-shadow:
        6px 0 0 #ffd35a,
        12px 0 0 #ff9b24,
        18px 0 0 #8a3510;
      animation: pixelSparkFast 0.26s steps(4, end) forwards;
    }
    
    .pixel-spark.heavy {
      width: 26px;
      height: 8px;
      background: #fff2a6;
      box-shadow:
        8px 0 0 #ffd35a,
        16px 0 0 #ff9b24,
        24px 0 0 #b84a12,
        32px 0 0 rgba(60, 20, 6, 0.8);
      animation: pixelSparkHeavy 0.42s steps(5, end) forwards;
    }
    
    @keyframes pixelSparkFast {
      0% {
        opacity: 1;
        transform:
          translate(-50%, -50%)
          rotate(var(--spark-angle))
          translate(0px, 0px)
          scaleX(0.65);
      }
    
      100% {
        opacity: 0;
        transform:
          translate(-50%, -50%)
          rotate(var(--spark-angle))
          translate(calc(var(--spark-x) * 1px), calc(var(--spark-y) * 1px))
          scaleX(1.15);
      }
    }
    
    @keyframes pixelSparkHeavy {
      0% {
        opacity: 1;
        transform:
          translate(-50%, -50%)
          rotate(var(--spark-angle))
          translate(0px, 0px)
          scaleX(0.75);
      }
    
      70% {
        opacity: 1;
      }
    
      100% {
        opacity: 0;
        transform:
          translate(-50%, -50%)
          rotate(var(--spark-angle))
          translate(calc(var(--spark-x) * 1px), calc(var(--spark-y) * 1px))
          scaleX(1.35);
      }
    }

    .pixel-ember {
      position: absolute;
    
      width: 10px;
      height: 10px;
    
      background: #ffb13b;
    
      image-rendering: pixelated;
    
      opacity: 0;
    
      box-shadow:
        0 0 0 2px #b84a12,
        0 0 0 4px rgba(40, 12, 4, 0.75);
    
      animation: fallingEmber 0.9s steps(7, end) forwards;
    }
    
    @keyframes fallingEmber {
      0% {
        opacity: 1;
    
        transform:
          translate(-50%, -50%)
          translate(0px, 0px)
          scale(1);
      }
    
      35% {
        opacity: 1;
      }
    
      100% {
        opacity: 0;
    
        transform:
          translate(-50%, -50%)
          translate(
            calc(var(--ember-x) * 1px),
            calc(var(--ember-y) * 1px)
          )
          scale(0.72);
      }
    }
    
    @keyframes slotImpactFlash {
      0% { opacity: 0; transform: scale(0.45); filter: brightness(1.3); }
      24% { opacity: 0.75; transform: scale(0.95); }
      100% { opacity: 0; transform: scale(1.28); filter: brightness(1); }
    }
    
    .slot-wrap.final-sync-pulse {
      animation: finalSlotSyncPulse 0.46s ease-out;
    }
    
    @keyframes finalSlotSyncPulse {
      0% { transform: scale(1); filter: brightness(1); }
      45% { transform: scale(1.035); filter: brightness(1.12); }
      100% { transform: scale(1); filter: brightness(1); }
    }
    
    .slot-wrap.forging-in {
      opacity: 0;
      transform: translateY(72px) scale(0.05);
      transform-origin: center center;
      animation: slotGrowIntoPlace 0.6s ease-out forwards;
    }
    
    @keyframes slotGrowIntoPlace {
      0% {
        transform: translateY(72px) scale(0.05);
        opacity: 0;
        filter: brightness(2) blur(2px);
      }
    
      55% {
        opacity: 1;
        filter: brightness(1.5) blur(0);
      }
    
      100% {
        transform: translateY(0) scale(1);
        opacity: 1;
        filter: brightness(1);
      }
    }

    .slot-wrap::before {
      content: "";
      position: absolute;
      inset: -8%;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(14px);
      transform: scale(1.02);
    }

    .slot-wrap img {
      position: relative;
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
      z-index: 1;
    }

    .sim-coin {
      object-fit: contain;
      image-rendering: pixelated;
      filter: none;
      transition: transform 0.2s ease;
    }

    .slot-coin {
      opacity: 0;
    }

    .slot-coin.materializing {
      opacity: 1;
      animation: coinMaterialize 0.14s ease-out forwards;
    }
    
    @keyframes coinMaterialize {
      0% {
        transform: translate(var(--forge-start-x), var(--forge-start-y)) scale(0.02);
        opacity: 0;
        filter: brightness(3) blur(3px);
      }
    
      70% {
        opacity: 1;
        filter: brightness(2.4) blur(1px);
      }
    
      100% {
        transform: translate(var(--forge-start-x), var(--forge-start-y)) scale(0.16);
        opacity: 1;
        filter: brightness(2);
      }
    }
    
    .slot-coin.forming-from-forge {
      opacity: 1;
    }
    
    .slot-wrap.coin-cycling {
      transform-origin: center center;
      animation: coinCycleSpin 0.42s linear infinite;
    }
    
    @keyframes coinCycleSpin {
      0% {
        transform: scale(1.22) rotateY(0deg);
        filter: brightness(1.18);
      }
    
      50% {
        transform: scale(1.22) rotateY(180deg);
        filter: brightness(1.42);
      }
    
      100% {
        transform: scale(1.22) rotateY(360deg);
        filter: brightness(1.18);
      }
    }
    
    .slot-coin.spinning {
      animation: slotSpin 0.34s linear infinite;
    }

    @keyframes slotSpin {
      from { transform: rotateY(0deg) scale(1); }
      to { transform: rotateY(360deg) scale(1.08); }
    }

    .slot-coin.landed {
      animation: slotLand 0.35s ease-out;
    }

    @keyframes slotLand {
      0% { transform: scale(1.22); filter: brightness(1.45); }
      30% { transform: scale(0.82); filter: brightness(1.35); }
      64% { transform: scale(1.06); filter: brightness(1.12); }
      100% { transform: scale(1); filter: brightness(1); }
    }

    .slot-coin.anticipating {
      animation: slotAnticipation 0.42s ease-in-out infinite alternate;
    }

    @keyframes slotAnticipation {
      from {
        transform: scale(1);
        filter: brightness(1.1) drop-shadow(0 0 14px rgba(255, 220, 120, 0.50));
      }
      to {
        transform: scale(1.16);
        filter: brightness(1.75) drop-shadow(0 0 30px rgba(255, 255, 255, 0.85));
      }
    }

    .slot-coin.near-miss {
      animation: slotNearMissFlash 0.18s ease-in-out infinite alternate;
    }

    @keyframes slotNearMissFlash {
      from {
        transform: scale(1);
        filter: brightness(1) drop-shadow(0 0 12px rgba(255,180,60,0.45));
      }
      to {
        transform: scale(1.12);
        filter: brightness(1.45) drop-shadow(0 0 26px rgba(255,255,255,0.75));
      }
    }

    .slot-wrap.landed-common::before {
      opacity: 0.28;
      background: radial-gradient(circle, rgba(220,220,220,0.36) 0%, rgba(220,220,220,0.22) 22%, rgba(220,220,220,0.12) 42%, rgba(220,220,220,0.04) 58%, transparent 70%);
    }

    .slot-wrap.landed-rare::before {
      opacity: 0.62;
      background: radial-gradient(circle, rgba(120,200,255,1.0) 0%, rgba(90,170,255,0.82) 18%, rgba(70,150,255,0.55) 36%, rgba(40,120,255,0.35) 50%, rgba(20,90,255,0.08) 62%, transparent 72%);
    }

    .slot-wrap.landed-epic::before {
      opacity: 0.66;
      background: radial-gradient(circle, rgba(220,140,255,1.0) 0%, rgba(190,110,255,0.84) 18%, rgba(170,80,255,0.58) 36%, rgba(140,50,255,0.36) 50%, rgba(120,20,255,0.08) 62%, transparent 72%);
    }

    .slot-wrap.landed-legendary::before {
      opacity: 0.76;
      background: radial-gradient(circle, rgba(255,235,120,1.0) 0%, rgba(255,210,100,0.82) 18%, rgba(255,180,50,0.55) 36%, rgba(255,160,20,0.35) 50%, rgba(255,140,0,0.08) 62%, transparent 72%);
    }

    .slot-wrap.landed-mythic::before {
      opacity: 0.82;
      background: radial-gradient(circle, rgba(255,255,180,1.0) 0%, rgba(255,180,80,0.88) 18%, rgba(255,90,40,0.62) 36%, rgba(255,40,20,0.40) 50%, rgba(255,0,0,0.10) 62%, transparent 74%);
    }

    .slot-wrap.landed-rainbow::before {
      opacity: 0.9;
      background:
        radial-gradient(circle,
          rgba(255,255,255,1.0) 0%,
          rgba(255,220,120,0.85) 16%,
          rgba(255,80,220,0.55) 34%,
          rgba(80,220,255,0.45) 52%,
          rgba(120,255,120,0.18) 66%,
          transparent 78%);
    }
    
    .slot-wrap.landed-cursed::before {
      opacity: 0.82;
      background: radial-gradient(circle, rgba(180,240,255,1.0) 0%, rgba(90,180,255,0.88) 18%, rgba(40,120,255,0.62) 36%, rgba(20,70,255,0.40) 50%, rgba(0,30,255,0.10) 62%, transparent 74%);
    }

    .slot-wrap.landed-common::before,
    .slot-wrap.landed-rare::before,
    .slot-wrap.landed-epic::before,
    .slot-wrap.landed-legendary::before,
    .slot-wrap.landed-mythic::before,
    .slot-wrap.landed-rainbow::before,
    .slot-wrap.landed-cursed::before {
      opacity: 0;
    }
    
    .forge-stage.impact {
      animation: stageImpact 0.28s ease-out !important;
    }

    @keyframes stageImpact {

function getCachedCoinFrame(coinKey, frameNumber) {

    let forgePressureLevel = 0;

    function setForgePressureForCoin(coinKey, progress = 0) {
      if (!forgeStage) return;
    
      let pressureGain = 0;
    
      switch (coinKey) {
        case "Gold":
          pressureGain = 0.018;
          break;
    
        case "Diamond":
        case "JackpotBooster":
          pressureGain = 0.032;
          break;
    
        case "Rainbow":
        case "Kingmaker":
          pressureGain = 0.045;
          break;
    
        case "Anti":
          pressureGain = 0.035;
          break;
    
        default:
          pressureGain = -0.012;
          break;
      }
    
      const latePressure =
        progress > 0.7
          ? ((progress - 0.7) / 0.3) * 0.012
          : 0;
    
      forgePressureLevel += pressureGain + latePressure;
    
      forgePressureLevel = Math.max(
        0,
        Math.min(forgePressureLevel, 0.14)
      );
    
      let opacity = 0.045 + forgePressureLevel;
      let brightness = 1 + (forgePressureLevel * 0.55);
      let saturation = 1 + (forgePressureLevel * 0.18);
      let hue = "0deg";
    
      if (coinKey === "Anti") {
        hue = "155deg";
        saturation = 0.9;
        brightness = 1.02 + (forgePressureLevel * 0.22);
      }
    
      forgeStage.classList.toggle(
        "pressure-cursed",
        coinKey === "Anti"
      );
    
      forgeStage.style.setProperty(
        "--forge-pressure-opacity",
        opacity.toFixed(2)
      );
    
      forgeStage.style.setProperty(
        "--forge-pressure-brightness",
        brightness.toFixed(2)
      );
    
      forgeStage.style.setProperty(
        "--forge-pressure-saturation",
        saturation.toFixed(2)
      );
    
      forgeStage.style.setProperty(
        "--forge-pressure-hue",
        hue
      );
    }

    function getForgeTimingProfile(pullCount) {
      const count = Number(pullCount) || 1;
    
      if (count <= 1) {
        return { growDuration: 2600, frameDelay: 16, totalFrames: 165 };
      }
    
      if (count === 2) {
        return { growDuration: 2200, frameDelay: 14, totalFrames: 135 };
      }
    
      if (count === 3) {
        return { growDuration: 1900, frameDelay: 13, totalFrames: 115 };
      }
    
      if (count === 4) {
        return { growDuration: 1650, frameDelay: 12, totalFrames: 100 };
      }
    
      return { growDuration: 1450, frameDelay: 11, totalFrames: 88 };
    }
    
    async function playFrameCoinSequence(slot, slotWrap, finalCoin) {
      if (!slot || !slotWrap) return;
    
      slotWrap.getAnimations().forEach(anim => anim.cancel());
    
      let frame = 1;
      let currentCoinKey = "Bronze";
    
      slotWrap.style.transform = "scale(0.08)";
      slotWrap.style.filter = "brightness(2.3) blur(2px)";
    
      slot.src = getCachedCoinFrame(currentCoinKey, frame);
      slot.style.opacity = "1";
    
      const growAnim = slotWrap.animate(
        [
          { transform: "scale(0.08)", filter: "brightness(2.3) blur(2px)" },
          { transform: "scale(0.14)", filter: "brightness(2.1) blur(1px)", offset: 0.18 },
          { transform: "scale(0.26)", filter: "brightness(1.95) blur(0.5px)", offset: 0.38 },
          { transform: "scale(0.52)", filter: "brightness(1.7)", offset: 0.60 },
          { transform: "scale(0.88)", filter: "brightness(1.45)", offset: 0.82 },
          { transform: "scale(1.22)", filter: "brightness(1.18)", offset: 1 }
        ],
        {
          duration: 2600,
          easing: "cubic-bezier(0.16, 1, 0.3, 1)",
          fill: "forwards"
        }
      );
    
      const frameDelay = 16;
      const totalFrames = 165;
      const teaseCoins = getTeaseCoinPool(finalCoin);
      const finalFrameCoinKey = getFinalFrameCoinKey(finalCoin);
          
      for (let i = 0; i < totalFrames; i++) {
        frame++;
    
        if (frame > coinFrameCount) {
          frame = 1;
        }
    
        const progress = i / totalFrames;

        if (frame === 9) {
          if (progress > 0.75) {
            currentCoinKey = teaseCoins[Math.floor(Math.random() * teaseCoins.length)];
          } else {
            currentCoinKey = getProofCoinKey(currentCoinKey);
          }
        
          setForgePressureForCoin(currentCoinKey, progress);
        }
    
        slot.src = getCachedCoinFrame(currentCoinKey, frame);
    
        let adjustedDelay = frameDelay;
    
        if (frame <= 3 || frame >= 14) {
          adjustedDelay = Math.max(8, frameDelay - 4);
        }
    
        if (frame >= 7 && frame <= 10) {
          adjustedDelay = frameDelay + 4;
        }
        
        // Tiny pre-lock hold near the end of the animation.
        // This creates suspense without adding a second animation phase.
        const isFinalTeaseWindow = progress > 0.88;
        const isThinCoinFrame = frame === 8 || frame === 9;
        
        if (isFinalTeaseWindow && isThinCoinFrame) {
          currentCoinKey = finalFrameCoinKey;
          slot.src = getCachedCoinFrame(finalFrameCoinKey, frame);
          setForgePressureForCoin(finalFrameCoinKey, 1);
        
          if (!slot.dataset.hammerSoundPlayed) {
            slot.dataset.hammerSoundPlayed = "true";
            playForgeHammerSound();
            triggerSparkStrikeGif(slot);
            triggerSocketCompression(slot);
          }
        
          await wait(15);
          break;
        }
        
        await wait(adjustedDelay);
      }
    
      growAnim.cancel();

      slotWrap.style.transform = "scale(1.22)";
      slotWrap.style.filter = "brightness(1.18)";
    
      return {
        frame,
        currentCoinKey
      };
    }
    
    async function growAndFakeoutSlot(slot, finalCoin, index) {
      const slotWrap = slot.closest(".slot-wrap");
      delete slot.dataset.hammerSoundPlayed;
      
      slot.classList.remove(
        "forming-from-forge",
        "landed"
      );
    
      if (slotWrap) {
        slotWrap.classList.remove("lock-impact");
        slotWrap.style.transform = "";
        slotWrap.style.filter = "";
      }
    
      slot.style.transform = "";
      slot.style.filter = "";
      slot.style.opacity = "0";
    
      if (slotWrap) {
        slotWrap.style.transform = "scale(0.08)";
        slotWrap.style.filter = "brightness(2.3) blur(2px)";
      }
      
      void slot.offsetWidth;
      
      slot.classList.add("forming-from-forge");
      
      await playFrameCoinSequence(slot, slotWrap, finalCoin);

      if (slotWrap) {
        slotWrap.style.transform = "";
        slotWrap.style.filter = "";
      }
      
      slot.classList.remove("forming-from-forge");
      slot.classList.remove("landed");
      void slot.offsetWidth;
      
      // FINAL LOCK + VISUAL IMPACT HAPPEN TOGETHER
      slot.src = coinFileForSlot(finalCoin, index);
      slot.classList.add("landed");
      
      forgeStage.classList.remove("impact");
      void forgeStage.offsetWidth;
      forgeStage.classList.add("impact");
      
      triggerImpactFlash();
    
      playSlotLandSound();
      triggerSocketRing(slot, finalCoin);
      triggerSlotImpact(slot, finalCoin);
      setTimeout(() => {
        clearForgePressure();
      }, 420);
    }
    
    async function spinSlot(slot, finalCoin, index, shouldLock) {
      if (!shouldLock) {
        const coin = randomCycleCoin();
        slot.src = coinFileForSlot(coin, index);
        return;
      }

      await growAndFakeoutSlot(slot, finalCoin, index);
      
      const slotWrap = slot.closest(".slot-wrap");
      if (slotWrap) {
        slotWrap.classList.add(`landed-${finalCoin.className}`);
      }

      clearCinematicStageClasses();

      forgeStage.classList.remove("impact");
      void forgeStage.offsetWidth;

      forgeStage.classList.add(`reveal-${finalCoin.className}`, "impact");

      if (
        finalCoin.name === "Rainbow Coin" ||
        finalCoin.name === "Kingmaker Coin" ||
        finalCoin.name === "Jackpot Booster"
      ) {
        triggerImpactFlash();
      }
      
      triggerSlotAura(finalCoin, slot);

      if (finalCoin.name === "Anti Coin" || (finalCoin.raw && finalCoin.raw.omenCorrupted)) {
        triggerCorruptionWave();
      }

      const cinematicPromise = playFinalCinematic(finalCoin, slot);

      await wait(160);

      forgeStage.classList.remove("impact");
      
      await cinematicPromise;

      clearActiveSlotFocus();
      clearCinematicStageClasses();
    }

    function getUsernameFontSize(name) {
      const length = String(name || "").length;
    
      if (length <= 8) return 24;
      if (length <= 12) return 20;
      if (length <= 16) return 16;
      if (length <= 20) return 13;
      if (length <= 24) return 11;
      if (length <= 28) return 9;
      if (length <= 32) return 7;
      if (length <= 36) return 6;
    
      return 5;
    }
    
    function fitUsernameToPlate() {
      const minSize = 6;
      let size = getUsernameFontSize(playerUsername.innerText);
    
      playerUsername.style.setProperty("--name-font-size", `${size}px`);
    
      while (
        playerUsername.scrollWidth > playerNameText.clientWidth &&
        size > minSize
      ) {
        size -= 1;
        playerUsername.style.setProperty("--name-font-size", `${size}px`);
      }
    }

    function getBadgePath(badgeIdOrPath) {
      const value = String(badgeIdOrPath || "").trim();

      if (!value) return "";

      if (
        value.startsWith("images/") ||
        value.startsWith("http://") ||
        value.startsWith("https://")
      ) {
        return value;
      }

      return `images/badges/${value}.png`;
    }
    
    function clearPlayerIdentity() {
      playerIdentityLayer.className = "player-identity-layer";
      playerNameplate.src = "";
      playerBadges.innerHTML = "";
      playerUsername.innerText = "";
      playerTitle.innerText = "";
    }
    
    function renderPlayerIdentity(event, highestClass) {
      clearPlayerIdentity();
    
      const displayName = event.displayUser || event.user || "Someone";
      const title = event.equippedTitle || event.title || "";
      const nameplatePath = event.nameplate || event.nameplatePath || "images/nameplates/default_cropped.png";
      const badges = Array.isArray(event.badges) ? event.badges : [];
    
      playerUsername.innerText = displayName;
      fitUsernameToPlate();
      
      playerTitle.innerText = title;
    
      playerNameplate.src = nameplatePath;
    
      badges.forEach((badgeIdOrPath, index) => {
        const badgePath = getBadgePath(badgeIdOrPath);

        if (!badgePath) return;

        const img = document.createElement("img");
        img.className = "player-badge";
        img.src = badgePath;
        img.alt = "";
        img.onerror = () => {
          console.warn("Missing badge image:", badgePath);
          img.remove();
        };
        img.style.animationDelay = `${Math.min(index, 10) * 0.04}s`;

        playerBadges.appendChild(img);
      });
    
      playerIdentityLayer.classList.add("visible");
    
      if (highestClass) {
        playerIdentityLayer.classList.add(`rarity-${highestClass}`);
      }
    }

    let achievementPopupTimeout = null;

    function getAchievementRarityIcon(rarity) {
      const clean = String(rarity || "common").trim().toLowerCase();

      const allowed = [
        "common",
        "rare",
        "epic",
        "legendary",
        "mythic",
        "cursed",
        "secret"
      ];

      return allowed.includes(clean)
        ? `images/achievements/icons/${clean}.png`
        : "images/achievements/icons/common.png";
    }
    
    function showAchievementPopup(data) {
      if (!achievementPopup) return;

      clearTimeout(achievementPopupTimeout);

      achievementPopup.classList.remove("visible");
      void achievementPopup.offsetWidth;

      const user = data.user || data.displayUser || "Someone";
      const title = data.title || data.name || "Achievement Unlocked";
      const description = data.description || data.desc || "";
      const rarity = data.rarity || "Common";
      const achievementId = data.achievementId || "unknown";

      achievementBanner.src = data.banner || "images/achievements/achievement_banner.png";
      achievementIcon.src = data.icon || getAchievementRarityIcon(rarity);

      achievementUser.innerText = `${String(user).toUpperCase()} UNLOCKED:`;
      achievementTitle.innerText = String(title).toUpperCase();
      achievementDesc.innerText = description;
      achievementRarity.innerText = rarity;

      achievementPopup.classList.add("visible");
      playAchievementSound();
      achievementPopupTimeout = setTimeout(() => {
        achievementPopup.classList.remove("visible");
      }, Number(data.duration || 2000));
    }
    
    async function runForgeRevealExternal(event) {
      clearRevealClasses();
      
     const rawCoins = Array.isArray(event.coins) ? event.coins : [];
      const results = rawCoins.map(getCoinDefinition);
      const pullCount = Math.max(1, Math.min(5, Number(event.pullCount || results.length || 1)));
      
      if (results.length === 0) {
        forgeStage.classList.remove("visible", "charging", "charged");
        document.body.classList.remove("forge-active");
        clearPlayerIdentity();
        slotRow.innerHTML = "";
        return;
      }
      
      forgeStage.classList.add("visible");
      document.body.classList.add("forge-active");
      
      const highestClass = highestRarityClass(results);
      renderPlayerIdentity(event, highestClass);

      forgeStage.classList.add("visible");

      await wait(0);
      
      createSlots(pullCount);
      forgeStage.classList.remove("charging");
      forgeStage.classList.add("charged");

      const slots = Array.from(document.querySelectorAll(".slot-coin"));

      if (pullCount === 1) {
      
        await spinSlot(
          slots[0],
          results[0] || results[results.length - 1],
          0,
          true
        );
      } else {
      
        const staggerDelay = Math.max(
          420,
          1050 - (pullCount * 120)
        );
      
        const spinPromises = slots.map((slot, i) => {
          return wait(i * staggerDelay).then(() => {
      
            return spinSlot(
              slot,
              results[i] || results[results.length - 1],
              i,
              true
            );
          });
        });
      
        await Promise.all(spinPromises);
      }

      forgeStage.classList.add(`reveal-${highestClass}`);
      
      triggerFinalSlotPulse();
      await wait(180);

      if (Array.isArray(event.achievements) && event.achievements.length > 0) {
        for (const achievementId of event.achievements) {
          showAchievementPopup(buildAchievementPopupData(event, achievementId));
          await wait(2200);
        }
      } else {
        await wait(event.displayMs || 1500);
      }

      forgeStage.classList.remove(
        "reveal-common",
        "reveal-rare",
        "reveal-epic",
        "reveal-legendary",
        "reveal-mythic",
        "reveal-rainbow",
        "reveal-cursed"
      );
      
      forgeStage.classList.remove("visible", "charged");
      document.body.classList.remove("forge-active");
      clearPlayerIdentity();
      
      await wait(350);
      
      slotRow.innerHTML = "";
      
    }

    function buildAchievementPopupData(event, achievementId) {
      const achievementMap = {
        first_pull: ["First Spark", "Pull your first coin.", "Common"],
        first_bronze: ["A Humble Beginning", "Pull your first Bronze coin.", "Common"],
        first_silver: ["Silver Lining", "Pull your first Silver coin.", "Rare"],
        first_gold: ["Golden Touch", "Pull your first Gold coin.", "Epic"],
        first_diamond: ["Shining Fortune", "Pull your first Diamond coin.", "Legendary"],
        first_rainbow: ["Impossible Fortune", "Pull your first Rainbow coin.", "Mythic"],
        first_anti: ["Cursed Fate", "Pull your first Anti coin.", "Cursed"]
      };

      const fallback = ["Achievement Unlocked", "A Coin Forge achievement was unlocked.", "Secret"];
      const entry = achievementMap[achievementId] || fallback;

      return {
        type: "coinForgeAchievement",
        user: event.user || event.displayUser || "Someone",
        displayUser: event.displayUser || event.user || "Someone",
        achievementId,
        title: entry[0],
        description: entry[1],
        rarity: entry[2]
      };
    }
    
    async function processForgeQueue() {
      if (forgeEventPlaying) return;

      forgeEventPlaying = true;

      while (forgeEventQueue.length > 0) {
        const event = forgeEventQueue.shift();
        await runForgeRevealExternal(event);

      }

      forgeEventPlaying = false;
    }

    function enqueueForgeEvent(event) {
      forgeEventQueue.push(event);
      processForgeQueue();
    }

    function handleStreamerbotMessage(message) {
      const data = message && message.data ? message.data : message;
    
      if (!data || !data.type) return;
    
      if (data.type === "coinForgePrepare") {
        if (forgeEventPlaying) return;
      
        clearRevealClasses();
        slotRow.innerHTML = "";
        forgeStage.classList.add("visible", "charging");
        document.body.classList.add("forge-active");
    
        return;
      }
    
      if (data.type === "coinForgeAchievement") {
        showAchievementPopup(data);
        return;
      }

      if (data.type !== "coinForgePull") return;
    
      enqueueForgeEvent(data);
    }

    function setupStreamerbotClient() {
      if (typeof StreamerbotClient === "undefined") {
        connectionStatus.textContent = "Streamer.bot client library not loaded.";
        document.body.classList.remove("hide-status");
        return;
      }

      const client = new StreamerbotClient({
        host: "127.0.0.1",
        port: 8080
      });

      client.on("General.Custom", handleStreamerbotMessage);

      client.on("connected", () => {
          connectionStatus.textContent = "Connected to Streamer.bot";
      
          setTimeout(() => {
              document.body.classList.add("hide-status");
          }, 2000);
      });

      client.on("disconnected", () => {
        connectionStatus.textContent = "Disconnected from Streamer.bot";
        document.body.classList.remove("hide-status");
      });
    }

    preloadCoinForgeAssets();
    setupStreamerbotClient();

    // Manual browser-console test:

    //     { name: "Anti", finalValue: -500, rarity: "cursed", omenCorrupted: false, devoured: false }

    //   forgeIgnited: false
    // });
