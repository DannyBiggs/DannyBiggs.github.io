<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coin Forge Overlay</title>

  <script src="https://cdn.jsdelivr.net/npm/@streamerbot/client/dist/streamerbot-client.js"></script>

  <style>
  @font-face {
    font-family: "ComboFont";
    src: url("fonts/PressStart2P-Regular.ttf") format("truetype");
    font-display: swap;
  }
  @font-face {
    font-family: "CoinForgeName";
    src: url("fonts/DungeonDepths-owJWV.ttf") format("truetype");
    font-display: swap;
  }
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    body {
      color: #e8d7a2;
      position: relative;
    }

    .overlay-root {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .screen-border-fx {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 40;
      opacity: 0;
      box-shadow: inset 0 0 90px rgba(255, 180, 40, 0);
    }
    
    .screen-border-fx.mythic {
      animation: screenMythicBorder 1.1s ease-out;
    }
    
    .screen-border-fx.cursed {
      animation: screenCursedBorder 0.9s ease-out;
    }
    
    .screen-border-fx.jackpot {
      animation: screenJackpotBorder 0.9s ease-out;
    }
    
    @keyframes screenMythicBorder {
      0% { opacity: 0; box-shadow: inset 0 0 0 rgba(255, 180, 40, 0); }
      30% { opacity: 1; box-shadow: inset 0 0 120px rgba(255, 190, 70, 0.75), inset 0 0 220px rgba(255, 90, 20, 0.28); }
      100% { opacity: 0; box-shadow: inset 0 0 40px rgba(255, 140, 30, 0); }
    }
    
    @keyframes screenCursedBorder {
      0% { opacity: 0; box-shadow: inset 0 0 0 rgba(80, 170, 255, 0); }
      30% { opacity: 1; box-shadow: inset 0 0 120px rgba(80, 170, 255, 0.65), inset 0 0 220px rgba(20, 60, 255, 0.28); }
      100% { opacity: 0; box-shadow: inset 0 0 40px rgba(80, 170, 255, 0); }
    }
    
    @keyframes screenJackpotBorder {
      0% { opacity: 0; box-shadow: inset 0 0 0 rgba(255, 40, 40, 0); }
      30% { opacity: 1; box-shadow: inset 0 0 120px rgba(255, 55, 55, 0.75), inset 0 0 220px rgba(120, 0, 0, 0.35); }
      100% { opacity: 0; box-shadow: inset 0 0 40px rgba(255, 40, 40, 0); }
    }
    
    .embers {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    body.forge-active .embers {
      opacity: 1;
    }

    .ember {
      position: absolute;
      bottom: -20px;
      width: 4px;
      height: 4px;
      background: #ffb347;
      border-radius: 50%;
      opacity: 0.45;
      box-shadow: 0 0 10px rgba(255,179,71,0.8);
      animation: riseEmber linear infinite;
    }

    .ember:nth-child(1) { left: 8%; animation-duration: 9s; animation-delay: 0s; }
    .ember:nth-child(2) { left: 20%; animation-duration: 13s; animation-delay: 2s; }
    .ember:nth-child(3) { left: 36%; animation-duration: 11s; animation-delay: 5s; }
    .ember:nth-child(4) { left: 52%; animation-duration: 15s; animation-delay: 1s; }
    .ember:nth-child(5) { left: 68%; animation-duration: 10s; animation-delay: 4s; }
    .ember:nth-child(6) { left: 86%; animation-duration: 14s; animation-delay: 3s; }

    body.forge-active .ember {
      background: #ffe08a;
      opacity: 0.88;
      box-shadow:
        0 0 14px rgba(255, 240, 170, 1),
        0 0 30px rgba(255, 190, 70, 0.72),
        0 0 48px rgba(255, 140, 35, 0.35);
    }
    
    body.forge-active .ember:nth-child(odd) {
      width: 6px;
      height: 6px;
    }
    
    body.forge-active .ember:nth-child(even) {
      width: 5px;
      height: 5px;
    }
    
    body.forge-active .ember:nth-child(1) { animation-duration: 7s; }
    body.forge-active .ember:nth-child(2) { animation-duration: 9s; }
    body.forge-active .ember:nth-child(3) { animation-duration: 8s; }
    body.forge-active .ember:nth-child(4) { animation-duration: 10s; }
    body.forge-active .ember:nth-child(5) { animation-duration: 7.5s; }
    body.forge-active .ember:nth-child(6) { animation-duration: 9.5s; }

    @keyframes riseEmber {
      0% { transform: translateY(0) scale(0.7); opacity: 0; }
      15% { opacity: 0.6; }
      100% { transform: translateY(-110vh) scale(1.4); opacity: 0; }
    }

    .forge-simulator {
      width: min(96vw, 1280px);
      text-align: center;
      pointer-events: none;
    }

    .forge-stage {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      margin: 0 auto;
      overflow: hidden;
      border-radius: 0;
      border: none;
      background: transparent;
      box-shadow: none;
      /*
      border-radius: 16px;
      border: 2px solid rgba(58, 42, 24, 0.85);
      background: transparent;
      box-shadow:
        0 0 28px rgba(255,179,71,0.16),
        inset 0 0 60px rgba(255,120,32,0.08);
      */
      opacity: 0;
      transform: scale(0.985);
      transition: opacity 1.15s ease, transform 1.15s ease;
    }

    .forge-stage.visible {
      opacity: 1;
      transform: scale(1);
    }

    .forge-background {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
      pointer-events: none;
      z-index: 1;
      
      transform: translateY(36px);
    }

    .forge-background-glow {
      position: absolute;
      inset: 0;
    
      width: 100%;
      height: 100%;
    
      object-fit: contain;
      image-rendering: pixelated;
    
      pointer-events: none;
    
      opacity: 0;
    
      z-index: 2;
    
      mix-blend-mode: screen;
      transform: translateY(36px);
    }

    /* ===== FORGE PRESSURE GAUGE TEST START ===== */
    .forge-pressure-fill {
      position: absolute;
    
      left: 50%;
      top: 34.5%;
    
      width: 430px;
      height: 430px;
    
      transform: translate(-50%, -50%) translateY(62px);
    
      border-radius: 50%;
    
      pointer-events: none;
    
      z-index: 0;
    
      opacity: 0.95;
    
      background: conic-gradient(
        from -90deg,
        rgba(255, 85, 18, 0.95) 0deg,
        rgba(255, 190, 55, 0.95) var(--pressure-deg, 180deg),
        transparent var(--pressure-deg, 180deg),
        transparent 360deg
      );
    
      mask: radial-gradient(
        circle,
        transparent 0 43%,
        black 44% 51%,
        transparent 52% 100%
      );
    
      -webkit-mask: radial-gradient(
        circle,
        transparent 0 43%,
        black 44% 51%,
        transparent 52% 100%
      );

      transition:
        opacity 260ms ease,
        filter 260ms ease;
      
      filter:
        brightness(1.05)
        drop-shadow(0 0 6px rgba(255, 135, 35, 0.45));
    }
    /* ===== FORGE PRESSURE GAUGE TEST END ===== */

    /* ===== FORGE ERUPTION FX START ===== */
    .forge-eruption-flash {
      position: absolute;
      left: 50%;
      top: 42%;
      width: 520px;
      height: 520px;
      transform: translate(-50%, -50%) scale(0.7);
      border-radius: 50%;
      pointer-events: none;
      z-index: 3;
      opacity: 0;
      mix-blend-mode: screen;
      background:
        radial-gradient(circle,
          rgba(255, 245, 185, 0.9) 0%,
          rgba(255, 150, 45, 0.36) 28%,
          rgba(255, 70, 20, 0.16) 52%,
          transparent 74%);
      filter: blur(10px);
    }
    
    .forge-eruption-vent {
      position: absolute;
      top: 54%;
      width: 110px;
      height: 210px;
      pointer-events: none;
      z-index: 4;
      opacity: 0;
      mix-blend-mode: screen;
      background:
        linear-gradient(
          to top,
          rgba(255, 235, 170, 0.7),
          rgba(255, 145, 40, 0.28) 42%,
          rgba(120, 55, 20, 0) 100%
        );
      filter: blur(8px);
    }
    
    .forge-eruption-vent.vent-left {
      left: 31%;
      transform: rotate(-18deg);
    }
    
    .forge-eruption-vent.vent-right {
      right: 31%;
      transform: rotate(18deg);
    }
    
    .forge-stage.forge-erupting {
      animation: forgeEruptionRecoil 520ms steps(5, end);
    }
    
    .forge-stage.forge-erupting .forge-background-glow {
      opacity: 1;
      animation: forgeEruptionGlow 1450ms steps(7, end);
    }
    
    .forge-stage.forge-erupting .forge-pressure-fill {
      filter:
        brightness(1.85)
        drop-shadow(0 0 14px rgba(255, 210, 95, 0.85))
        drop-shadow(0 0 26px rgba(255, 90, 20, 0.45));
    }
    
    .forge-stage.forge-erupting .forge-eruption-flash {
      animation: forgeEruptionFlash 920ms ease-out;
    }
    
    .forge-stage.forge-erupting .forge-eruption-vent {
      animation: forgeEruptionVent 1250ms steps(8, end);
    }
    
    @keyframes forgeEruptionRecoil {
      0% { transform: scale(1); }
      18% { transform: scale(1.012) translateY(-3px); }
      42% { transform: scale(0.992) translateY(3px); }
      68% { transform: scale(1.006) translateY(-1px); }
      100% { transform: scale(1); }
    }
    
    @keyframes forgeEruptionGlow {
      0% { filter: brightness(1.2) saturate(1.1); }
      18% { filter: brightness(2.25) saturate(1.9); }
      34% { filter: brightness(1.45) saturate(1.25); }
      48% { filter: brightness(2.05) saturate(1.75); }
      70% { filter: brightness(1.65) saturate(1.35); }
      100% { filter: brightness(1.15) saturate(1.05); }
    }
    
    @keyframes forgeEruptionFlash {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.64); }
      18% { opacity: 0.95; transform: translate(-50%, -50%) scale(0.98); }
      52% { opacity: 0.34; transform: translate(-50%, -50%) scale(1.16); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.32); }
    }
    
    @keyframes forgeEruptionVent {
      0% { opacity: 0; height: 90px; }
      18% { opacity: 0.85; height: 230px; }
      46% { opacity: 0.55; height: 190px; }
      100% { opacity: 0; height: 260px; }
    }
    /* ===== FORGE ERUPTION FX END ===== */
    
    .forge-light-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;

      opacity: 0;

      background:
        radial-gradient(circle at 50% 34%, rgba(255, 125, 25, 0.52), transparent 7%),
        radial-gradient(circle at 50% 82%, rgba(255, 85, 15, 0.46), transparent 12%),
        radial-gradient(circle at 32% 49%, rgba(255, 125, 25, 0.24), transparent 12%),
        radial-gradient(circle at 68% 49%, rgba(255, 125, 25, 0.24), transparent 12%);

      mix-blend-mode: screen;

      filter: blur(10px);

      animation: none;
    }

    @keyframes forgeLightWake {
      from { opacity: 0.35; transform: scale(0.99); }
      to { opacity: 0.75; transform: scale(1.015); }
    }

    .forge-glow {
      position: absolute;
      left: 50%;
      top: 31%;
      width: 170px;
      height: 170px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background:
        radial-gradient(circle,
          rgba(255,140,40,0.60) 0%,
          rgba(255,140,40,0.18) 45%,
          transparent 75%);
      filter: blur(12px);
      animation: forgePulse 2s ease-in-out infinite alternate;
      z-index: 3;
    }

    @keyframes forgePulse {
      from { opacity: 0.55; transform: translate(-50%, -50%) scale(0.9); }
      to { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
    }

    .forge-stage.charging .forge-background-glow {
      opacity: var(--forge-pressure-opacity, 0.045);
      filter:
        brightness(var(--forge-pressure-brightness, 1))
        saturate(var(--forge-pressure-saturation, 1))
        hue-rotate(var(--forge-pressure-hue, 0deg));
      
      transition:
        opacity 420ms ease,
        filter 420ms ease;
    }
    
    .forge-stage.charging .forge-glow {
      opacity: var(--forge-core-opacity, 0.72);
      transform:
        translate(-50%, -50%)
        scale(var(--forge-core-scale, 1));
      transition: opacity 90ms linear, transform 90ms linear;
    }
    
    .forge-stage.pressure-cursed .forge-background-glow {
      mix-blend-mode: screen;
    }
    
    @keyframes forgeChargeGlow {
      from {
        opacity: 0.18;
        filter: brightness(1);
      }
    
      to {
        opacity: 0.95;
        filter: brightness(1.5);
      }
    }

    .forge-stage.charged .forge-background-glow {
      opacity: 0.85;
      filter: brightness(1.35);
    }

    .forge-stage.escalate-warm .forge-background-glow {
      opacity: 0.9;
      filter: brightness(1.48) saturate(1.18);
    }

    .forge-stage.weekly-champion .forge-background-glow {
      opacity: 1;
      filter:
        brightness(2.15)
        saturate(1.95)
        hue-rotate(-22deg)
        drop-shadow(0 0 22px rgba(255, 220, 110, 0.65));
    
      mix-blend-mode: screen;
      animation: weeklyForgeGlow 3.8s ease-in-out infinite alternate;
    }
    
    @keyframes weeklyForgeGlow {
      from {
        opacity: 0.82;
        filter:
          brightness(1.75)
          saturate(1.55)
          hue-rotate(-16deg)
          drop-shadow(0 0 16px rgba(255, 205, 90, 0.42));
      }
    
      to {
        opacity: 1;
        filter:
          brightness(2.35)
          saturate(2.15)
          hue-rotate(-24deg)
          drop-shadow(0 0 34px rgba(255, 235, 150, 0.82));
      }
    }

    .forge-stage.weekly-champion::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 58%;
      width: 760px;
      height: 430px;
      transform: translate(-50%, -50%);
      pointer-events: none;
    
      background:
        radial-gradient(circle,
          rgba(255, 222, 120, 0.26) 0%,
          rgba(255, 180, 60, 0.14) 34%,
          rgba(255, 120, 30, 0.06) 56%,
          transparent 76%);
    
      filter: blur(18px);
      mix-blend-mode: screen;
      animation: weeklyForgeHalo 4.6s ease-in-out infinite alternate;
      z-index: 0;
    }
    
    @keyframes weeklyForgeHalo {
      from {
        opacity: 0.45;
        transform: translate(-50%, -50%) scale(0.96);
      }
    
      to {
        opacity: 0.9;
        transform: translate(-50%, -50%) scale(1.06);
      }
    }
    
    .forge-stage.weekly-champion::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    
      background:
        radial-gradient(circle at 50% 38%,
          rgba(255, 245, 170, 0.18),
          transparent 38%),
        radial-gradient(circle at 50% 78%,
          rgba(255, 220, 95, 0.30),
          rgba(255, 175, 45, 0.14) 22%,
          transparent 38%),
        radial-gradient(ellipse at 50% 88%,
          rgba(255, 205, 80, 0.22),
          transparent 42%);
    
      mix-blend-mode: screen;
      animation: championForgeBloom 4.2s ease-in-out infinite;
      z-index: 4;
    }
    
    @keyframes championForgeBloom {
      0% {
        opacity: 0.24;
        transform: scale(0.97);
      }
    
      50% {
        opacity: 0.7;
        transform: scale(1.035);
      }
    
      100% {
        opacity: 0.24;
        transform: scale(0.97);
      }
    }
    
    .forge-stage.escalate-cursed .forge-background-glow {
      opacity: 0.72;
      filter: brightness(1.08) saturate(0.82) hue-rotate(155deg);
    }
    
    .slot-wrap.active-slot {
      filter: brightness(1.18) drop-shadow(0 0 18px rgba(255, 185, 80, 0.55));
    }
    
    .slot-wrap.inactive-slot {
      filter: brightness(0.72) saturate(0.85);
    }
    
    .slot-row {
      position: absolute;
      left: 50%;
      top: 46%;
      width: 72%;
      transform: translate(-50%, -50%);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0px;
      z-index: 5;
    }

    .slot-wrap {
      position: relative;
      width: 240px;
      height: 240px;
    
      display: flex;
      align-items: center;
      justify-content: center;
    
      flex-shrink: 0;
    }

    .slot-wrap.lock-impact {
      animation: slotWrapRecoil 0.34s ease-out;
    }
    
    @keyframes slotWrapRecoil {
      0% { transform: scale(1); }
      28% { transform: scale(1.08) translateY(-2px); }
      55% { transform: scale(0.97) translateY(1px); }
      78% { transform: scale(1.025) translateY(0); }
      100% { transform: scale(1); }
    }

    .slot-wrap.socket-compress {
      animation: socketCompress 0.36s steps(5, end) forwards;
    }
    
    @keyframes socketCompress {
      0% { transform: translateY(0px) scale(1); filter: brightness(1); }
      22% { transform: translateY(10px) scaleX(1.08) scaleY(0.86); filter: brightness(1.28); }
      48% { transform: translateY(-4px) scaleX(0.96) scaleY(1.08); filter: brightness(1.12); }
      72% { transform: translateY(2px) scaleX(1.02) scaleY(0.97); filter: brightness(1.04); }
      100% { transform: translateY(0px) scale(1); filter: brightness(1); }
    }

    .slot-socket-ring {
      position: absolute;
      inset: 13%;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      border: 3px solid rgba(255, 235, 170, 0.95);
      box-shadow:
        0 0 8px rgba(255, 210, 120, 0.45),
        inset 0 0 8px rgba(255, 150, 40, 0.25);
      transform: scale(0.55);
    }
    
    .slot-socket-ring.active {
      animation: socketRingLock 0.42s ease-out;
    }
    
    .slot-socket-ring.common {
      border-color: rgba(220, 220, 220, 0.7);
      box-shadow: 0 0 10px rgba(220, 220, 220, 0.35);
    }
    
    .slot-socket-ring.rare {
      border-color: rgba(100, 180, 255, 0.9);
      box-shadow:
        0 0 16px rgba(100, 180, 255, 0.65),
        inset 0 0 18px rgba(80, 150, 255, 0.35);
    }
    
    .slot-socket-ring.epic {
      border-color: rgba(195, 95, 255, 0.9);
      box-shadow:
        0 0 18px rgba(195, 95, 255, 0.7),
        inset 0 0 18px rgba(160, 70, 255, 0.35);
    }
    
    .slot-socket-ring.legendary {
      border-color: rgba(255, 220, 95, 0.95);
      box-shadow:
        0 0 22px rgba(255, 190, 70, 0.8),
        inset 0 0 20px rgba(255, 150, 40, 0.45);
    }
    
    .slot-socket-ring.mythic {
      border-color: rgba(255, 245, 180, 1);
      box-shadow:
        0 0 34px rgba(255, 230, 120, 1),
        0 0 62px rgba(255, 120, 30, 0.55),
        inset 0 0 30px rgba(255, 180, 50, 0.65);
    }
    
    .slot-socket-ring.rainbow {
      border-color: rgba(255, 255, 255, 1);
      box-shadow:
        0 0 30px rgba(255, 255, 255, 0.95),
        0 0 58px rgba(255, 80, 220, 0.65),
        0 0 76px rgba(80, 220, 255, 0.55);
    }
    
    .slot-socket-ring.cursed {
      border-color: rgba(90, 190, 255, 0.95);
      box-shadow:
        0 0 32px rgba(90, 190, 255, 0.95),
        0 0 62px rgba(30, 80, 255, 0.55),
        inset 0 0 30px rgba(20, 80, 255, 0.6);
    }
    
    @keyframes socketRingLock {
      0% {
        opacity: 0;
        transform: scale(0.72) rotate(0deg);
      }
    
      18% {
        opacity: 1;
        transform: scale(1.02) rotate(8deg);
      }
    
      58% {
        opacity: 0.85;
        transform: scale(0.96) rotate(-3deg);
      }
    
      100% {
        opacity: 0;
        transform: scale(1.12) rotate(0deg);
      }
    }
  
      
    .slot-impact-flash {
      position: absolute;
      inset: 16%;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      background: radial-gradient(circle, rgba(255, 235, 170, 0.62) 0%, rgba(255, 170, 60, 0.24) 34%, transparent 72%);
      transform: scale(0.45);
    }
    
    .slot-impact-flash.active {
      animation: slotImpactFlash 0.42s ease-out;
    }

    .slot-wrap .burned-away-gif {
      position: absolute !important;
    
      left: 50%;
      top: 50%;
    
      width: 210px !important;
      height: 210px !important;
    
      object-fit: contain;
      image-rendering: pixelated;
    
      pointer-events: none;
    
      opacity: 0;
    
      z-index: 12 !important;
    
      transform: translate(-50%, -50%) scale(0.85);
    
      flex: none;
    }
    
    .slot-wrap .overcharge-duplicate-coin {
      position: absolute !important;

      left: 50%;
      top: 50%;

      width: 100%;
      height: 100%;

      object-fit: contain;
      image-rendering: pixelated;

      pointer-events: none;

      opacity: 0;

      z-index: 2;

      transform: translate(-50%, -50%);

      flex: none;
    }
    
    /* ===== FORGE INSTABILITY FX START ===== */
    .forge-instability-badge {
      position: absolute;
      left: 50%;
      top: 5%;
      transform: translate(-50%, -50%) scale(0.75);
      opacity: 0;
      z-index: 6;
      pointer-events: none;
      font-family: "ComboFont", monospace;
      font-size: 10px;
      letter-spacing: 1px;
      white-space: nowrap;
      text-shadow:
        0 0 6px rgba(0, 0, 0, 0.9),
        0 0 12px rgba(0, 0, 0, 0.85);
    }

    .slot-wrap.instability-overcharged {
      filter:
        brightness(1.95)
        saturate(1.35)
        drop-shadow(0 0 22px rgba(255, 235, 130, 1))
        drop-shadow(0 0 42px rgba(255, 120, 30, 0.72));
    }

    .slot-wrap.instability-overcharged .slot-coin {
      animation:
        forgeInstabilityOvercharged 0.72s steps(6, end);
    }

function getCachedCoinFrame(coinKey, frameNumber) {
  const src = coinFramePath(coinKey, frameNumber);

  return coinFrameCache[src].src;
}
    
    function preloadCoinForgeAssets() {

      // Warm animation frames after Streamer.bot is already connected.
      // This avoids blocking the first visible forge/coin startup.
      Object.keys(coinFrameConfig).forEach((coinKey, coinIndex) => {
        setTimeout(() => {
          for (let frame = 1; frame <= coinFrameCount; frame++) {
            getCachedCoinFrame(coinKey, frame);
          }
        }, coinIndex * 120);
      });
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));

    function setForgePressureGauge(percent) {
      if (!forgePressureFill) return;
    
      const safePercent = Math.max(0, Math.min(37, Number(percent) || 0));
      const degrees = safePercent * 3.6;
    
      forgePressureFill.style.setProperty("--pressure-deg", `${degrees}deg`);
      currentForgePressurePercent = safePercent;
    }
    
    function animateForgePressureGauge(targetPercent, duration = 900) {
      if (!forgePressureFill) return;
    
      const safeTarget = Math.max(0, Math.min(37, Number(targetPercent) || 0));
      const startPercent = currentForgePressurePercent;
      const change = safeTarget - startPercent;
      const startTime = performance.now();
    
      if (forgePressureAnimationFrame) {
        cancelAnimationFrame(forgePressureAnimationFrame);
      }
    
      function step(now) {
        const elapsed = now - startTime;
        const progress = Math.min(1, elapsed / duration);
    
        // Smooth ease-out
        const eased = 1 - Math.pow(1 - progress, 3);
    
        const nextPercent = startPercent + (change * eased);
        setForgePressureGauge(nextPercent);
    
        if (progress < 1) {
          forgePressureAnimationFrame = requestAnimationFrame(step);
        } else {
          forgePressureAnimationFrame = null;
        }
      }
    
      forgePressureAnimationFrame = requestAnimationFrame(step);
    }
    
    const forgePressureStateClasses = [
      "pressure-empty",
      "pressure-low",
      "pressure-warm",
      "pressure-volatile",
      "pressure-critical"

    function getForgePressureState(actualPressure) {
      const safePressure = Math.max(0, Math.min(100, Number(actualPressure) || 0));

      if (safePressure <= 0) return "empty";
      if (safePressure < 25) return "low";
      if (safePressure < 50) return "warm";
      if (safePressure < 75) return "volatile";
      return "critical";
    }

    function setForgePressureStateFromValue(actualPressure) {
      overlayState.pressureState = getForgePressureState(actualPressure);

      if (forgeStage) {
        forgeStage.dataset.pressureState = overlayState.pressureState;
        forgeStage.classList.remove(...forgePressureStateClasses);
        forgeStage.classList.add(`pressure-${overlayState.pressureState}`);
      }

      return overlayState.pressureState;
    }

      overlayState.currentPressure = safePressure;
      setForgePressureStateFromValue(safePressure);
    
      // Your visible gauge max is 37% of the full circle.
      const visiblePercent = (safePressure / 100) * 37;
    
      animateForgePressureGauge(visiblePercent, 900);

    function setForgePressureForCoin(coinKey, progress = 0) {
      if (!forgeStage) return;

      overlayState.pressureGlowActive = true;
    
      let pressureGain = 0;
    
      switch (coinKey) {
        case "Gold":
          pressureGain = 0.018;
          break;
    
        case "Diamond":
        case "JackpotBooster":
          pressureGain = 0.032;
          break;
    
        case "Rainbow":
        case "Kingmaker":
          pressureGain = 0.045;
          break;
    
        case "Anti":
          pressureGain = 0.035;
          break;
    
        default:
          pressureGain = -0.012;
          break;
      }
    
      const latePressure =
        progress > 0.7
          ? ((progress - 0.7) / 0.3) * 0.012
          : 0;
    
      forgePressureLevel += pressureGain + latePressure;
    
      forgePressureLevel = Math.max(
        0,
        Math.min(forgePressureLevel, 0.14)
      );
    
      let opacity = 0.045 + forgePressureLevel;
      let brightness = 1 + (forgePressureLevel * 0.55);
      let saturation = 1 + (forgePressureLevel * 0.18);
      let hue = "0deg";
    
      if (coinKey === "Anti") {
        hue = "155deg";
        saturation = 0.9;
        brightness = 1.02 + (forgePressureLevel * 0.22);
      }
    
      setForgePressureCursedState(coinKey === "Anti");
    
      forgeStage.style.setProperty(
        "--forge-pressure-opacity",
        opacity.toFixed(2)
      );
    
      forgeStage.style.setProperty(
        "--forge-pressure-brightness",
        brightness.toFixed(2)
      );
    
      forgeStage.style.setProperty(
        "--forge-pressure-saturation",
        saturation.toFixed(2)
      );
    
      forgeStage.style.setProperty(
        "--forge-pressure-hue",
        hue
      );
    }

    function handleForgePressurePayload(pullId, finalCoin) {
      if (!isActivePull(pullId)) return;
      if (!finalCoin || !finalCoin.raw) return;

      const pressureAfter =
        typeof finalCoin.raw.forgePressureAfter === "number"
          ? finalCoin.raw.forgePressureAfter
          : null;

      const eruptionTriggered =
        finalCoin.raw.jackpotHit === true;

      overlayState.lastPressurePayload = {
        pressureAfter,
        eruptionTriggered,
        source: eruptionTriggered ? "payload-jackpotHit" : "payload-pressure",
        coinName: finalCoin.name || finalCoin.raw.name || ""
      };

      if (pressureAfter === null) return;

      if (eruptionTriggered) {
        triggerForgeEruptionLifecycle(
          pullId,
          {
            pressureAfter,
            source: "payload-jackpotHit"
          }
        );

        return;
      }

      updateForgePressureGauge(pressureAfter);
    }

      if (!isActivePull(pullId)) return;
      if (!forgeStage) return;

      const pressureAfter =
        typeof options.pressureAfter === "number"
          ? options.pressureAfter
          : overlayState.currentPressure;

      setForgeEruptionState(
        "erupting",
        {

      overlayState.currentPressure = 100;

      registerOwnedCleanupTimer(
        pullId,
        () => {
          if (!isActivePull(pullId)) return;
          updateForgePressureGauge(pressureAfter);
        },
        1200

      registerOwnedCleanupTimer(
        pullId,
        () => {
          setForgeEruptionState("idle");
          overlayState.forgeState = "active";
        },
        1900
      );
    
      playForgeHammerSound(pullId);

      if (options.restart === true) {

    function addOwnedElementEffect(pullId, element, className, duration = null, options = {}) {
      if (!isActivePull(pullId)) return;
      if (!element || !className) return;

      const timerKey = className.replace(/[^a-zA-Z0-9]/g, "_");

      if (!element.__ownedEffectTimers) {
        element.__ownedEffectTimers = {};
      }

      if (element.__ownedEffectTimers[timerKey]) {
        clearTimeout(element.__ownedEffectTimers[timerKey]);
        delete element.__ownedEffectTimers[timerKey];
      }

      if (options.restart === true) {
        element.classList.remove(className);
        void element.offsetWidth;
      }

      element.classList.add(className);

      if (duration !== null) {
        element.__ownedEffectTimers[timerKey] = setTimeout(() => {
          element.classList.remove(className);
          delete element.__ownedEffectTimers[timerKey];
        }, duration);
      }

      duration,

      if (options.displayValue) {
        element.style.display = options.displayValue;
      }

      addOwnedElementEffect(
        pullId,
        element,
        className,
        null,
        options
      );

      if (duration !== null) {
        const timerKey = `display_${className.replace(/[^a-zA-Z0-9]/g, "_")}`;

        if (!element.__ownedEffectTimers) {
          element.__ownedEffectTimers = {};
        }

        if (element.__ownedEffectTimers[timerKey]) {
          clearTimeout(element.__ownedEffectTimers[timerKey]);
          delete element.__ownedEffectTimers[timerKey];
        }

        element.__ownedEffectTimers[timerKey] = setTimeout(() => {
          element.classList.remove(className);

          if (options.hideAfter === true) {
            element.style.display = "none";

          if (typeof options.onComplete === "function") {

          delete element.__ownedEffectTimers[timerKey];

    function getTeaseCoinPool(finalCoin) {
      if (!finalCoin) {
        return ["Gold", "Diamond", "Anti"];

      if (finalCoin.name === "Bronze Coin" || finalCoin.name === "Silver Coin") {

    function getForgeTimingProfile(pullCount) {
      const count = Number(pullCount) || 1;
    
      if (count <= 1) {
        return { growDuration: 2600, frameDelay: 16, totalFrames: 165 };
      }
    
      if (count === 2) {
        return { growDuration: 2200, frameDelay: 14, totalFrames: 135 };
      }
    
      if (count === 3) {
        return { growDuration: 1900, frameDelay: 13, totalFrames: 115 };
      }
    
      if (count === 4) {
        return { growDuration: 1650, frameDelay: 12, totalFrames: 100 };
      }
    
      return { growDuration: 1450, frameDelay: 11, totalFrames: 88 };

    async function playFrameCoinSequence(slot, slotWrap, finalCoin, pullId) {
      if (!isActivePull(pullId)) return;
      if (!slot || !slotWrap) return;
    
      slotWrap.getAnimations().forEach(anim => anim.cancel());
    
      let frame = 1;
      let currentCoinKey = "Bronze";
    
      slotWrap.style.transform = "scale(0.08)";
      slotWrap.style.filter = "brightness(2.3) blur(2px)";
    
      slot.src = getCachedCoinFrame(currentCoinKey, frame);
      slot.style.opacity = "1";
    
      const growAnim = slotWrap.animate(
        [
          { transform: "scale(0.08)", filter: "brightness(2.3) blur(2px)" },
          { transform: "scale(0.14)", filter: "brightness(2.1) blur(1px)", offset: 0.18 },
          { transform: "scale(0.26)", filter: "brightness(1.95) blur(0.5px)", offset: 0.38 },
          { transform: "scale(0.52)", filter: "brightness(1.7)", offset: 0.60 },
          { transform: "scale(0.88)", filter: "brightness(1.45)", offset: 0.82 },
          { transform: "scale(1.22)", filter: "brightness(1.18)", offset: 1 }
        ],
        {
          duration: 2600,
          easing: "cubic-bezier(0.16, 1, 0.3, 1)",
          fill: "forwards"
        }
      );
    
      const frameDelay = 16;
      const totalFrames = 165;
      const teaseCoins = getTeaseCoinPool(finalCoin);
      const finalFrameCoinKey = getFinalFrameCoinKey(finalCoin);
          
      for (let i = 0; i < totalFrames; i++) {
        if (!isActivePull(pullId)) {
          growAnim.cancel();
          return;
        }

        frame++;
    
        if (frame > coinFrameCount) {
          frame = 1;
        }
    
        const progress = i / totalFrames;

        if (frame === 9) {
          if (progress > 0.75) {
            currentCoinKey = teaseCoins[Math.floor(Math.random() * teaseCoins.length)];
          } else {
            currentCoinKey = getProofCoinKey(currentCoinKey);
          }
        
          setForgePressureForCoin(currentCoinKey, progress);
        }
    
        slot.src = getCachedCoinFrame(currentCoinKey, frame);
    
        let adjustedDelay = frameDelay;
    
        if (frame <= 3 || frame >= 14) {
          adjustedDelay = Math.max(8, frameDelay - 4);
        }
    
        if (frame >= 7 && frame <= 10) {
          adjustedDelay = frameDelay + 4;
        }
        
        // Tiny pre-lock hold near the end of the animation.
        // This creates suspense without adding a second animation phase.
        const isFinalTeaseWindow = progress > 0.88;
        const isThinCoinFrame = frame === 8 || frame === 9;
        
        if (isFinalTeaseWindow && isThinCoinFrame) {
          currentCoinKey = finalFrameCoinKey;
          slot.src = getCachedCoinFrame(finalFrameCoinKey, frame);
          setForgePressureForCoin(finalFrameCoinKey, 1);
        
          if (!slot.dataset.hammerSoundPlayed) {
            slot.dataset.hammerSoundPlayed = "true";
            if (!isActivePull(pullId)) {
              growAnim.cancel();
              return;
            }

            playForgeHammerSound(pullId);
            triggerSparkStrikeGif(slot, pullId);
            triggerSocketCompression(slot, pullId);
          }
        
          await wait(15);
          break;
        }
        
        await wait(adjustedDelay);
      }
    
      growAnim.cancel();

      slotWrap.style.transform = "scale(1.22)";
      slotWrap.style.filter = "brightness(1.18)";
    
      return {
        frame,
        currentCoinKey
      };
    }
    
    async function growAndFakeoutSlot(slot, finalCoin, index, pullId) {
      if (!isActivePull(pullId)) return;
      const slotWrap = slot.closest(".slot-wrap");
      setSlotState(slotWrap, "forming", { pullId, coin: finalCoin.name });

    async function playWoodBurnupIfNeeded(slot, finalCoin, pullId) {
      if (!isActivePull(pullId)) return;
      if (!slot || !finalCoin || finalCoin.name !== "Wood Coin") return;
      if (slot.dataset.woodBurned === "true") return;
      slot.dataset.woodBurned = "true";
    
      const event = window.currentForgeEvent || {};
      const finalBurnPile = Math.max(0, Math.min(35, Number(event.burnPile || 0)));
    
      const currentWoodIndex = Number(window.currentWoodBurnIndex || 0);
      const totalWoodThisPull = Math.max(1, Number(window.currentWoodBurnTotal || 1));
    
      let remainingToIgnition = 0;
    
      if (event.forgeIgnited) {
        remainingToIgnition = Math.max(0, totalWoodThisPull - currentWoodIndex - 1);
      } else {
        const estimatedBurnPileForThisWood =
          finalBurnPile - (totalWoodThisPull - currentWoodIndex - 1);
    
        remainingToIgnition = Math.max(
          0,
          35 - Math.max(0, estimatedBurnPileForThisWood)
        );
      }
    
      window.currentWoodBurnIndex = currentWoodIndex + 1;

      if (remainingToIgnition === 0) {
        playForgeIgnitionSound(pullId);
      }
    
      setSlotState(slot, "burning", { pullId, coin: finalCoin.name });
      addCoinEffect(pullId, slot, "wood-burn-prep", 700, { restart: true });
      await wait(700);
    
      const stageRect = forgeStage.getBoundingClientRect();
      const coinRect = slot.getBoundingClientRect();
    
      const coinCenterX = coinRect.left + coinRect.width / 2 - stageRect.left;
      const coinCenterY = coinRect.top + coinRect.height / 2 - stageRect.top + 8;
    
      const fire = document.createElement("img");
      fire.className = "wood-burn-burst";
      fire.src = "images/vfx/FireBurst_64x64.gif";
      fire.alt = "";
      fire.style.left = `${coinCenterX}px`;
      fire.style.top = `${coinCenterY}px`;
    
      const counter = document.createElement("div");
      counter.className = "wood-burn-count";
      counter.textContent = remainingToIgnition;
      counter.style.left = `${coinCenterX}px`;
      counter.style.top = `${coinCenterY}px`;
    
      forgeStage.appendChild(fire);
      forgeStage.appendChild(counter);
      
     playWoodBurnSound(pullId);
      
      if (remainingToIgnition === 0) {
        triggerForgeIgnitionVisuals(pullId);
      }
    
      await wait(320);
      slot.style.opacity = "0";
    
      await wait(180);
      counter.classList.add("visible");
    
      await wait(120);

      fire.style.display = "none";
      
      await wait(640);
      
      fire.remove();
      counter.remove();
    }

async function triggerForgeInstabilityVisual(slot, finalCoin, pullId) {
  if (!isActivePull(pullId)) return;
  if (!slot || !finalCoin || !finalCoin.raw) return;

  const effect = finalCoin.raw.forgeInstabilityEffect || "";
  if (!effect) return;

  const slotWrap = slot.closest(".slot-wrap");

  });

  if (!ownedEffect) return;

}
    
    async function spinSlot(slot, finalCoin, index, shouldLock, pullId) {
      if (!shouldLock) {
        const coin = randomCycleCoin();
        slot.src = coinFileForSlot(coin, index);
        return;
      }

      await growAndFakeoutSlot(slot, finalCoin, index, pullId);

      if (!isActivePull(pullId)) return;
      
      const slotWrap = slot.closest(".slot-wrap");
      if (slotWrap) {
        addSlotEffect(pullId, slotWrap, `landed-${finalCoin.className}`);

      achievementIcon.src = data.icon || getAchievementRarityIcon(rarity);

      achievementUser.innerText = `${String(user).toUpperCase()} UNLOCKED:`;
      achievementTitle.innerText = String(title).toUpperCase();
      achievementDesc.innerText = description;
      achievementRarity.innerText = rarity;

      achievementPopup.classList.add("visible");
      playAchievementSound();
      achievementPopupTimeout = setTimeout(() => {
        achievementPopup.classList.remove("visible");
      }, Number(data.duration || 2000));
      
      registerCleanupTimer(achievementPopupTimeout);
          }

    function queueAchievementDisplay(data) {
      achievementDisplayQueue.push(data);
      processAchievementDisplayQueue();
    }
    
    async function processAchievementDisplayQueue() {
      if (achievementDisplayActive) return;
    
      achievementDisplayActive = true;
    
      while (achievementDisplayQueue.length > 0) {
        const data = achievementDisplayQueue.shift();
        showAchievementPopup(data);
    
        await wait(Number(data.duration || 2000) + 250);
      }
    
      achievementDisplayActive = false;
    }

    function getComboOwnerKey() {
      const event = overlayState.activePayload || window.currentForgeEvent || {};
      return String(event.userId || event.user || event.displayUser || "unknown").toLowerCase();
    }

    function queueComboDisplay(type, value = null, pullId) {
      if (!isActivePull(pullId)) return;

      const ownerKey = getComboOwnerKey();

      if (type === "broken") {
        clearComboMilestoneHistoryForOwner(ownerKey);
      }

      if (type === "milestone") {
        const milestoneKey = `${ownerKey}:milestone:${value ?? ""}`;

        if (overlayState.comboMilestoneHistory.has(milestoneKey)) return;

        overlayState.comboMilestoneHistory.add(milestoneKey);
      }

      const comboKey = `${pullId}:${type}:${value ?? ""}`;

      if (overlayState.comboDisplayKeys.has(comboKey)) return;

      overlayState.comboDisplayKeys.add(comboKey);
      comboDisplayQueue.push({ type, value, pullId });
      processComboDisplayQueue();
    }

    function clearComboMilestoneHistoryForOwner(ownerKey) {
      const prefix = `${ownerKey}:`;

      for (const key of Array.from(overlayState.comboMilestoneHistory)) {
        if (key.startsWith(prefix)) {
          overlayState.comboMilestoneHistory.delete(key);
        }
      }
    }

    function clearComboDisplayState() {
      comboDisplayRunId++;
      comboDisplayQueue.length = 0;
      comboDisplayActive = false;
      overlayState.comboDisplayKeys.clear();

      if (comboPopup) {
        comboPopup.className = "combo-popup";
        comboPopup.innerText = "";
      }
    }
    
    async function processComboDisplayQueue() {
      if (comboDisplayActive) return;
    
      comboDisplayActive = true;
      const runId = comboDisplayRunId;
    
      while (comboDisplayQueue.length > 0 && runId === comboDisplayRunId) {
        const item = comboDisplayQueue.shift();
        if (!isActivePull(item.pullId)) continue;

        showComboPopup(item.type, item.value, item.pullId);
        if (item.type === "broken") {
          await wait(1900);
        } else {
          switch (item.value) {
            case 100:
              await wait(3400);
              break;
        
            case 75:
              await wait(3000);
              break;
        
            case 50:
              await wait(2700);
              break;
        
            default:
              await wait(2400);
              break;
          }
        }
        if (!isActivePull(item.pullId)) {
          clearComboDisplayState();
          return;
        }
      }
    
      if (runId === comboDisplayRunId) {
        comboDisplayActive = false;
      }
    }

    function showForgeIgnitePopup() {
      if (!comboPopup) return;
    
      comboPopup.className = "combo-popup forge-ignite visible";
      comboPopup.innerText = "THE FORGE IGNITES";
    }
    
    function showComboPopup(type, value = null, pullId) {
      if (!isActivePull(pullId)) return;
      if (!comboPopup) return;
    
      comboPopup.className = "combo-popup";
      comboPopup.innerText = "";
      void comboPopup.offsetWidth;
    
      if (type === "broken") {
        comboPopup.innerText = "COMBO BROKEN";
        comboPopup.classList.add("broken", "visible");
    
        playOwnedSound(pullId, comboSounds.broken, true);
        return;
      }
    
      comboPopup.innerText = `COMBO X${value}`;
      comboPopup.classList.add("milestone", `x${value}`, "visible");
    
      const sound = comboSounds[value];
      if (sound) {
        playOwnedSound(pullId, sound, true);
      }
    }
    
    async function runForgeRevealExternal(event) {
      const pullId = event.pullId;

      if (!isActivePull(pullId)) return;

      clearComboDisplayState();
      clearRevealClasses();
      window.currentForgeEvent = event;

      setForgeIgnitedState(event.forgeIgnitedActive === true);
            
     const rawCoins = Array.isArray(event.coins) ? event.coins : [];
      const results = rawCoins.map(getCoinDefinition);
      const pullCount = Math.max(1, Math.min(5, Number(event.pullCount || results.length || 1)));
      window.currentWoodBurnIndex = 0;
      window.currentWoodBurnTotal = results.filter(coin => coin.name === "Wood Coin").length;
      
      if (results.length === 0) {
        hideForgeStage();
        clearPlayerIdentity();
        slotRow.innerHTML = "";

        resetForgePressureLifecycleVisuals();

        clearSlotStates();

        resetForgeRuntimeOwnership({
          includePersistent: true,
          clearPullOwnership: true
        });
        stopOwnedAudio();

        return;
      }
      
      showForgeStage();
      
      const highestClass = highestRarityClass(results);
      renderPlayerIdentity(event, highestClass);

      await wait(0);

      const existingSlots = document.querySelectorAll(".slot-coin");
      
      if (existingSlots.length !== pullCount) {
        createSlots(pullCount);
      }
      
      setForgeChargeState("charged");

      const slots = Array.from(document.querySelectorAll(".slot-coin"));

      if (pullCount === 1) {
      
        await spinSlot(
          slots[0],
          results[0] || results[results.length - 1],
          0,
          true,
          pullId
        );
      } else {
      
        const staggerDelay = Math.max(
          420,
          1050 - (pullCount * 120)
        );
      
        const spinPromises = slots.map((slot, i) => {
          return wait(i * staggerDelay).then(() => {
      
            return spinSlot(
              slot,
              results[i] || results[results.length - 1],
              i,
              true,
              pullId
            );
          });
        });
      
        await Promise.all(spinPromises);
      }

      addStageEffect(pullId, `reveal-${highestClass}`);
      
      triggerFinalSlotPulse(pullId);
      await wait(180);

      await wait(event.displayMs || 1500);

      clearStageRevealEffects();
      cinematicBurst.classList.remove("active");
      
      hideForgeStage();
      clearPlayerIdentity();
      
      await wait(350);
      
      clearSlotStates();
      resetForgeInstabilityOwnership({ includePersistent: true });
      slotRow.innerHTML = "";
      
      resetForgePressureLifecycleVisuals();
      
      resetForgeRuntimeOwnership({
        includePersistent: true,
        clearPullOwnership: true
      });
      stopOwnedAudio();
      clearComboDisplayState();
      
    }

    async function processForgeQueue() {
      if (forgeEventPlaying) return;

      forgeEventPlaying = true;

      while (overlayState.queue.length > 0) {
        const event = overlayState.queue.shift();
      
        overlayState.isAnimating = true;
        overlayState.activePayload = event;
        overlayState.activePullId = event.pullId;
      
        await runForgeRevealExternal(event);
      
      }

      forgeEventPlaying = false;
    }

    function enqueueForgeEvent(event) {
      const ownedEvent = normalizeForgeEventPullId(event);
      overlayState.queue.push(ownedEvent);
      processForgeQueue();
    }

    function handleStreamerbotMessage(message) {
      let data = message && message.data ? message.data : message;
    
      if (typeof data === "string") {
        try {
          data = JSON.parse(data);
        } catch (err) {
          console.warn("Could not parse Streamer.bot message:", data);
          return;
        }
      }
    
      if (!data || !data.type) return;
    
      if (data.type === "coinForgePrepare") {
        if (forgeEventPlaying) return;
      
        clearRevealClasses();
        slotRow.innerHTML = "";
      
        const preparePullCount = Math.max(
          1,
          Math.min(5, Number(data.pullCount || 1))
        );
      
        if (
          typeof data.forgePressure === "number" &&
          !overlayState.isAnimating &&
          overlayState.queue.length === 0
        ) {
          updateForgePressureGauge(data.forgePressure);
        }
      
        showForgeStage();
        setForgeChargeState("charging");
      
        createSlots(preparePullCount);
      
        const previewSlots = Array.from(document.querySelectorAll(".slot-coin"));
      
        previewSlots.forEach((slot, index) => {
          const slotWrap = slot.closest(".slot-wrap");
      
          slot.src = getCachedCoinFrame("Bronze", 1);
          slot.style.opacity = "1";
          slot.style.transform = "scale(0.12)";
          slot.style.filter = "brightness(2.1) blur(1px)";
      
          if (slotWrap) {
            slotWrap.style.opacity = "0";
            slotWrap.style.transform = "translateY(72px) scale(0.08)";
            slotWrap.style.filter = "brightness(2.2) blur(2px)";
      
            setTimeout(() => {
              slotWrap.style.transition =
                "opacity 220ms ease, transform 420ms ease, filter 420ms ease";
              slotWrap.style.opacity = "1";
              slotWrap.style.transform = "translateY(0) scale(0.28)";
              slotWrap.style.filter = "brightness(1.7) blur(0.5px)";
            }, index * 90);
          }
        });
      
        return;
      }

      if (data.type === "coinForgeWeeklyWinners") {
        showWeeklyWinnerCeremony(data);
        return;
      }
      
      if (data.type === "coinForgeAchievement") {
        showAchievementPopup(data);
        return;
      }

      if (data.type !== "coinForgePull") return;
            
      enqueueForgeEvent(data);
    }

    function setupStreamerbotClient() {
  if (typeof StreamerbotClient === "undefined") {
    connectionStatus.textContent = "Streamer.bot client library not loaded.";
    document.body.classList.remove("hide-status");
    return;
  }

  window.client = new StreamerbotClient({
    host: "127.0.0.1",
    port: 8080
  });

  window.client.on("General.Custom", handleStreamerbotMessage);

  window.client.on("General.Broadcast", (message) => {
    console.log("GENERAL BROADCAST RECEIVED:", message);
  
    let payload = message?.data ?? message?.message ?? message;
  
    if (typeof payload === "string") {
      try {
        payload = JSON.parse(payload);
      } catch (err) {
        console.warn("Broadcast was not valid JSON:", payload);
        return;
      }
    }
  
    console.log("GENERAL BROADCAST PAYLOAD:", payload);
  
    if (payload?.type === "coinForgeWeeklyWinners") {
      handleStreamerbotMessage(payload);
    }
  });

  window.client.on("disconnected", () => {
    console.log("Disconnected from Streamer.bot");

    connectionStatus.textContent = "Disconnected from Streamer.bot";
    document.body.classList.remove("hide-status");
  });
}
