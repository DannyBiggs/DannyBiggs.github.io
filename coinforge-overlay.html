    function handleStreamerbotMessage(message) {
      let data = message && message.data ? message.data : message;
    
      if (typeof data === "string") {
        try {
          data = JSON.parse(data);
        } catch (err) {
          console.warn("Could not parse Streamer.bot message:", data);
          return;
        }
      }
    
      if (!data || !data.type) return;
    
      if (data.type === "coinForgePrepare") {
        if (forgeEventPlaying) return;
      
        clearRevealClasses();
        slotRow.innerHTML = "";
      
        const preparePullCount = Math.max(
          1,
          Math.min(5, Number(data.pullCount || 1))
        );
      
        if (
          typeof data.forgePressure === "number" &&
          !overlayState.isAnimating &&
          overlayState.queue.length === 0
        ) {
          updateForgePressureGauge(data.forgePressure);
        }
      
        showForgeStage();
        setForgeChargeState("charging");
      
        createSlots(preparePullCount);
      
        const previewSlots = Array.from(document.querySelectorAll(".slot-coin"));
      
        previewSlots.forEach((slot, index) => {
          const slotWrap = slot.closest(".slot-wrap");
      
          slot.src = getCachedCoinFrame("Bronze", 1);
          slot.style.opacity = "1";
          slot.style.transform = "scale(0.12)";
          slot.style.filter = "brightness(2.1) blur(1px)";
      
          if (slotWrap) {
            slotWrap.style.opacity = "0";
            slotWrap.style.transform = "translateY(72px) scale(0.08)";
            slotWrap.style.filter = "brightness(2.2) blur(2px)";
      
            setTimeout(() => {
              slotWrap.style.transition =
                "opacity 220ms ease, transform 420ms ease, filter 420ms ease";
              slotWrap.style.opacity = "1";
              slotWrap.style.transform = "translateY(0) scale(0.28)";
              slotWrap.style.filter = "brightness(1.7) blur(0.5px)";
            }, index * 90);
          }
        });
      
        return;
      }

      if (data.type === "coinForgeWeeklyWinners") {
        showWeeklyWinnerCeremony(data);
        return;
      }
      
      if (data.type === "coinForgeAchievement") {
        showAchievementPopup(data);
        return;
      }

      if (data.type === "coinForgeBossAttack") {
        const attackBossType = normalizeBossWorldType(data.bossType || data.bossName || "invidra");
        const attackType = String(data.attackType || "").toLowerCase();

        triggerBossAttackReaction(attackBossType, {
          source: `streamerbot-boss-attack-${attackType || "unknown"}`,
          payload: data
        });

        if (attackBossType === "avaros" && attackType === "siphon") {
          triggerAvarosForgeSiphonVisual(data);

          triggerBossHealReaction(attackBossType, {
            ...data,
            bossActive: true,
            bossHp: data.bossHp || overlayState.lastBossHp || 1,
            bossMaxHp: data.bossMaxHp || overlayState.lastBossMaxHp || 1500,
            worldBossHealing: data.worldBossHealing || data.bossHealing || data.stolen || 1
          }, {
            source: "avaros-siphon-heal-reaction"
          });
        }

        if (attackBossType === "invidra") {
          triggerScreenBorder("cursed");

          if (bossSpriteLayer) {
            bossSpriteLayer.classList.remove("boss-omen-curse-reaction");
            void bossSpriteLayer.offsetWidth;
            bossSpriteLayer.classList.add("boss-omen-curse-reaction");

            setTimeout(() => {
              bossSpriteLayer.classList.remove("boss-omen-curse-reaction");
            }, 1450);
          }
        }
      
        return;
      }
      
      if (data.type === "coinForgeBossState") {
        const isDefeatStatePayload =
          data.active === true &&
          (
            data.defeated === true ||
            data.bossDefeated === true ||
            String(data.bossEncounterState || data.encounterState || "").toLowerCase() === "defeated"
          );
      
        if (isDefeatStatePayload) {
          return;
        }

        if (
          overlayState.bossEncounterState === "defeated" ||
          overlayState.bossDefeatCleanupPromise
        ) {
          return;
        }
        
        if (
          data.active === false ||
          data.clear === true ||
          String(data.bossType || data.bossName || data.boss || "").toLowerCase() === "none"
        ) {
          const endedAsDefeat =
            data.defeated === true ||
            data.bossDefeated === true ||
            String(data.bossEncounterState || data.encounterState || "").toLowerCase() === "defeated";

          if (endedAsDefeat) {
            return;
          }

          const forgeQueueIsActive =
            forgeEventPlaying === true ||
            overlayState.isAnimating === true ||
            Boolean(overlayState.activePullId) ||
            overlayState.queue.length > 0 ||
            Boolean(overlayState.pendingBossDamageSync) ||
            Boolean(overlayState.pendingCoreBreachBossDamageSync);

          if (forgeQueueIsActive) {
            overlayState.deferredBossWorldClearPayload = data;
            return;
          }

          overlayState.bossWorldSyncSuppressed = true;
          overlayState.pendingBossDamageSync = null;
          overlayState.pendingCoreBreachBossDamageSync = null;

          setBossEncounterState("escaped", {
            source: "streamerbot",
            payload: data
          });

          setTimeout(() => {
            clearBossWorldState({ force: true });
          }, 900);

          return;
        }
      
        overlayState.bossWorldSyncSuppressed = false;
      
        const incomingBossType = data.bossType || data.bossName || data.boss;
        const normalizedIncomingBossType = normalizeBossWorldType(incomingBossType);
      
        const normalizedBossPayload = {
          bossActive: true,
          bossType: incomingBossType,
          bossName: data.bossName || data.bossType || data.boss,
          bossHp: data.bossHp ?? data.hp ?? data.currentHp ?? data.maxHp ?? data.bossMaxHp ?? 1500,
          bossMaxHp: data.bossMaxHp ?? data.maxHp ?? 1500,
          bossDefeated: data.bossDefeated === true || data.defeated === true,
          defeated: data.bossDefeated === true || data.defeated === true,
          bossEncounterState: data.bossEncounterState || data.encounterState || "spawning"
        };
      
        console.log(
          "[Boss Payload]",
          data.bossType,
          data.bossEncounterState,
          data.bossHp,
          data.bossMaxHp
        );
        
        const shouldPlayBossIntro =
          normalizedIncomingBossType &&
          overlayState.activeBossWorldState?.type !== normalizedIncomingBossType;

        if (shouldPlayBossIntro) {
          triggerBossIntro(normalizedIncomingBossType, normalizedBossPayload);
          return;
        }
        
        syncBossHudFromPayload(normalizedBossPayload, {
          source: "streamerbot"
        });
      
        return;
      }
      
      if (data.type !== "coinForgePull") return;

      window.latestCoinForgePayload = data;

      const hasDeferredBossHpChange =
        data.bossActive === true &&
        overlayState.bossWorldSyncSuppressed !== true &&
        (
          Number(data.worldBossDamage || data.bossDamage || 0) > 0 ||
          Number(data.worldBossHealing || data.bossHealing || 0) > 0
        );

      const hasPendingCoreBreachBossDamage = false;
      
      if (
        !hasDeferredBossHpChange &&
        overlayState.bossWorldSyncSuppressed !== true &&
        overlayState.bossEncounterState !== "defeated" &&
        !overlayState.bossDefeatCleanupPromise &&
        !hasPendingCoreBreachBossDamage
      ) {
        syncBossHudFromPayload(data, {
          source: "coinForgePull-pre-reveal"
        });
      }
      
      enqueueForgeEvent(data);

        }

    function setupStreamerbotClient() {
  if (typeof StreamerbotClient === "undefined") {
    connectionStatus.textContent = "Streamer.bot client library not loaded.";
    document.body.classList.remove("hide-status");
    return;
  }

  window.client = new StreamerbotClient({
    host: "127.0.0.1",
    port: 8080
  });

  window.client.on("General.Custom", handleStreamerbotMessage);

  window.client.on("General.Broadcast", (message) => {
    console.log("GENERAL BROADCAST RECEIVED:", message);
  
    let payload = message?.data ?? message?.message ?? message;
  
    if (typeof payload === "string") {
      try {
        payload = JSON.parse(payload);
      } catch (err) {
        console.warn("Broadcast was not valid JSON:", payload);
        return;
      }
    }
  
    console.log("GENERAL BROADCAST PAYLOAD:", payload);
  
    if (
      payload?.type === "coinForgeWeeklyWinners" ||
      payload?.type === "coinForgeBossState" ||
      payload?.type === "coinForgeBossAttack"
    ) {
      handleStreamerbotMessage(payload);
    }
  });

  window.client.on("disconnected", () => {
    console.log("Disconnected from Streamer.bot");

    connectionStatus.textContent = "Disconnected from Streamer.bot";
    document.body.classList.remove("hide-status");
  });
}

    preloadCoinForgeAssets();
    setupStreamerbotClient();
